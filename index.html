<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1a0f">
  <title>SpinVibes Golf</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg:      #0d1a0f;
      --surf:    #14231a;
      --surf2:   #1a2d20;
      --surf3:   #1f3526;
      --border:  rgba(255,255,255,0.08);
      --cream:   #f0ead8;
      --muted:   #8a9e8e;
      --gold:    #c9a84c;
      --gold-l:  #d4b86a;
      --green:   #2d6a3f;
      --green-b: #1e4d2b;
      --red:     #c0392b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--cream); font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; }

    /* LOADING */
    #loading { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 9999; }
    #loading .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; color: var(--gold); letter-spacing: 5px; }
    #loading .sub  { font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    #loading .spinner { width: 36px; height: 36px; border: 3px solid rgba(201,168,76,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes sv-shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
    #loading .err { font-size: 0.85rem; color: #e87070; text-align: center; max-width: 280px; line-height: 1.5; display: none; }

    /* APP SHELL */
    #app { display: none; flex-direction: column; height: 100dvh; max-width: 500px; margin: 0 auto; }

    /* TOPBAR */
    .topbar { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; padding-top: calc(10px + env(safe-area-inset-top,0px)); border-bottom: 1px solid var(--border); background: var(--bg); }
    .tb-brand { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--gold); letter-spacing: 3px; line-height: 1; }
    .tb-user  { font-size: 0.65rem; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 1px; }
    .tb-btn   { background: var(--surf2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 9px; font-size: 0.9rem; cursor: pointer; color: var(--cream); touch-action: manipulation; }

    /* PAGES */
    .pages { flex: 1; overflow: hidden; position: relative; }
    .page { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding: 16px 16px calc(76px + env(safe-area-inset-bottom,0px)); display: none; }
    .page.on { display: block; }

    /* NAV */
    .nav { flex-shrink: 0; display: flex; background: var(--bg); border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom,0px); }
    .nb { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 9px 2px 7px; background: none; border: none; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 0.55rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; touch-action: manipulation; }
    .nb i { font-size: 1.3rem; }
    .nb.on { color: var(--gold); }

    /* COMPONENTS */
    .hero { background: linear-gradient(135deg,var(--surf),var(--surf2)); border-radius: 16px; padding: 20px; margin-bottom: 14px; border: 1px solid rgba(201,168,76,0.15); }
    .hero-hi   { font-size: 0.62rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
    .hero-name { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; line-height: 1; color: var(--cream); margin-bottom: 4px; }
    .hero-goal { font-size: 0.88rem; color: var(--gold); font-weight: 600; margin-bottom: 10px; }
    .hero-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25); border-radius: 20px; padding: 3px 10px; font-size: 0.68rem; font-weight: 600; color: var(--gold); }
    .pill.g { background: rgba(45,106,63,0.15); border-color: rgba(45,106,63,0.3); color: #6ec98a; }

    .sec-title { font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin: 18px 0 8px; }
    .card { background: var(--surf); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid var(--border); }
    .card-title { font-weight: 700; font-size: 0.88rem; color: var(--cream); margin-bottom: 4px; }
    .card-body  { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

    .stats-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .stat { flex: 1; background: var(--surf); border-radius: 10px; padding: 11px 8px; text-align: center; border: 1px solid var(--border); }
    .stat-n { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--gold); line-height: 1; }
    .stat-l { font-size: 0.56rem; color: var(--muted); font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .qc { background: var(--surf); border-radius: 14px; padding: 16px 14px; border: 1px solid var(--border); cursor: pointer; touch-action: manipulation; transition: background 0.1s; }
    .qc:active { background: var(--surf2); }
    .qc-icon { font-size: 1.4rem; color: var(--gold); margin-bottom: 6px; }
    .qc-title { font-weight: 700; font-size: 0.85rem; color: var(--cream); }
    .qc-sub   { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

    /* CADDIE */
    .caddie-outer { display: flex; flex-direction: column; height: calc(100dvh - 110px - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px)); }
    .caddie-msgs { flex: 1; overflow-y: auto; overscroll-behavior: contain; display: flex; flex-direction: column; gap: 10px; padding-bottom: 10px; }
    .msg { padding: 10px 14px; border-radius: 12px; font-size: 0.87rem; line-height: 1.55; max-width: 88%; }
    .msg.u { background: var(--green); color: #e8f5ec; align-self: flex-end; border-radius: 12px 12px 2px 12px; }
    .msg.c { background: var(--surf2); color: var(--cream); align-self: flex-start; border-radius: 12px 12px 12px 2px; border: 1px solid var(--border); }
    .msg.s { background: rgba(201,168,76,0.08); color: var(--muted); align-self: center; font-size: 0.74rem; border: 1px solid rgba(201,168,76,0.15); border-radius: 8px; text-align: center; max-width: 100%; }
    .caddie-row { display: flex; gap: 8px; padding-top: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .caddie-row textarea { flex: 1; background: var(--surf2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--cream); font-family: 'Outfit',sans-serif; font-size: 0.87rem; resize: none; outline: none; }
    .caddie-row button { background: var(--green); border: none; border-radius: 10px; padding: 10px 16px; color: #e8f5ec; font-weight: 700; cursor: pointer; touch-action: manipulation; }

    /* BUTTONS */
    .btn-gold  { background: var(--gold); border: none; border-radius: 12px; padding: 14px 20px; color: #1a1300; font-family: 'Outfit',sans-serif; font-size: 0.92rem; font-weight: 700; cursor: pointer; touch-action: manipulation; }
    .btn-ghost { background: none; border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; color: var(--cream); font-family: 'Outfit',sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; touch-action: manipulation; }
    .mi { width: 100%; background: var(--surf2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--cream); font-family: 'Outfit',sans-serif; font-size: 0.92rem; outline: none; margin-bottom: 12px; }
    .ml { font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }

    /* ROUND MODAL (full-screen) */
    #round-modal { display: none; position: fixed; inset: 0; z-index: 500; background: var(--bg); flex-direction: column; padding-top: env(safe-area-inset-top,0px); }
    #round-modal.on { display: flex; }
    #rm-header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); touch-action: none; }
    #rm-label  { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1; color: var(--gold); }
    #rm-sub    { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; display: none; }
    #rm-rt     { text-align: right; line-height: 1; display: none; }
    #rm-rt-score { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--cream); }
    #rm-rt-diff  { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px; color: var(--muted); }
    #rm-close-btn { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; touch-action: manipulation; }
    #rm-body   { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding: 20px; padding-bottom: 12px; }
    #rm-footer { flex-shrink: 0; display: none; background: var(--bg); border-top: 1px solid var(--border); padding: 8px 16px calc(8px + env(safe-area-inset-bottom,0px)); }

    /* APPROACH SLIDER */
    .live-dist-card { background: var(--surf2); border: 1px solid rgba(201,168,76,0.2); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; }
    .live-yards { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--gold); line-height: 1; }
    .club-suggest { background: var(--surf); border: 1px solid rgba(201,168,76,0.25); border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; display: none; }

    /* SCORE STEPPER */
    .score-cell { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1; color: var(--cream); min-width: 48px; text-align: center; }
    .step-btn { width: 44px; height: 50px; border-radius: 10px; background: var(--surf); border: 1px solid var(--border); font-size: 1.6rem; font-weight: 300; color: var(--cream); cursor: pointer; touch-action: manipulation; display: flex; align-items: center; justify-content: center; }

    /* DRILL */
    .drill { background: var(--surf); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; border: 1px solid var(--border); }
    .drill-t { font-weight: 700; font-size: 0.88rem; color: var(--gold); margin-bottom: 4px; }
    .drill-b { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

    /* ROUND HISTORY */
    .rc { background: var(--surf); border-radius: 12px; padding: 13px 16px; margin-bottom: 10px; border: 1px solid var(--border); }
    .rc-score { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--cream); line-height: 1; }

    /* HOLE GRID */
    .hole-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .hg-cell { width: 30px; height: 36px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--surf2); font-size: 0.6rem; gap: 1px; }
    .hg-cell .hn { color: var(--muted); font-size: 0.55rem; }
    .hg-cell .hs { font-weight: 700; font-size: 0.82rem; }
    .hs-eagle  { color: #a78bfa; }
    .hs-birdie { color: #60a5fa; }
    .hs-par    { color: #6ec98a; }
    .hs-bogey  { color: var(--cream); }
    .hs-double { color: #f87171; }
    .hs-worse  { color: #ef4444; }

    /* RESUME BANNER */
    #resume-banner { display: none; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.4); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; cursor: pointer; touch-action: manipulation; }

    /* PHOTO STRIP */
    .photo-strip { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding: 2px 0 6px; scrollbar-width: none; }
    .photo-thumb { position: relative; flex-shrink: 0; }
    .photo-thumb img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(201,168,76,0.3); cursor: pointer; }
    .photo-rm { position: absolute; top: -4px; right: -4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(192,57,43,0.9); border: none; color: #fff; font-size: 0.65rem; cursor: pointer; touch-action: manipulation; display: flex; align-items: center; justify-content: center; }
    .photo-add { flex-shrink: 0; width: 80px; height: 80px; background: var(--surf2); border: 1px dashed rgba(201,168,76,0.3); border-radius: 8px; color: var(--muted); font-size: 0.72rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; touch-action: manipulation; }

    .toast { position: fixed; bottom: calc(72px + env(safe-area-inset-bottom,0px) + 12px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surf2); border: 1px solid var(--border); border-radius: 20px; padding: 8px 18px; font-size: 0.82rem; color: var(--cream); opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 9000; white-space: nowrap; pointer-events: none; }
    .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* AUTH MODAL */
    #auth-modal { position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:9998;padding:24px; }
    #auth-modal.on { display:flex; }
    #auth-modal-inner { background:var(--surf);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;text-align:center; }
    #auth-modal input[type=email] { width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--cream);font-size:1rem;font-family:inherit;margin:16px 0 12px;box-sizing:border-box; }
    #auth-modal input[type=email]::placeholder { color:var(--muted); }
    #auth-modal input[type=email]:focus { outline:none;border-color:rgba(201,168,76,0.5); }
  </style>
</head>
<body>

<div id="loading">
  <div class="logo">SPINVIBES</div>
  <div class="sub" id="loading-sub">Loading your app…</div>
  <div class="spinner"></div>
  <div class="err" id="load-err"></div>
</div>

<!-- AUTH MODAL -->
<div id="auth-modal">
  <div id="auth-modal-inner">
    <div style="font-size:1.5rem;margin-bottom:6px;">⛳</div>
    <div style="font-weight:700;font-size:1.05rem;color:var(--cream);" id="auth-modal-title">Save your progress</div>
    <div style="font-size:0.82rem;color:var(--muted);margin-top:6px;line-height:1.5;" id="auth-modal-sub">Enter your email and we'll send a magic link — no password needed. Your rounds and stats will sync across devices.</div>
    <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email">
    <button class="btn-primary" style="width:100%;" id="auth-send-btn" onclick="submitMagicLink()">Send Magic Link</button>
    <div id="auth-msg" style="font-size:0.8rem;margin-top:12px;color:var(--muted);line-height:1.4;"></div>
    <button onclick="closeAuthModal()" style="margin-top:14px;font-size:0.78rem;color:var(--muted);background:none;border:none;cursor:pointer;">Cancel</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div>
      <div class="tb-brand">SPINVIBES</div>
      <div class="tb-user" id="tb-user"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="tb-btn" id="tb-auth-btn" onclick="showAuthModal()" title="Sign in"><i class="ti ti-user-plus"></i></button>
      <button class="tb-btn" onclick="toggleDark()"><i class="ti ti-sun"></i></button>
    </div>
  </div>

  <div class="pages">
    <div class="page on" id="pg-home"></div>
    <div class="page" id="pg-caddie"></div>
    <div class="page" id="pg-range"></div>
    <div class="page" id="pg-stretch"></div>
    <div class="page" id="pg-shortgame"></div>
    <div class="page" id="pg-strategy"></div>
    <div class="page" id="pg-mygame"></div>
  </div>

  <nav class="nav">
    <button class="nb on" onclick="goPage('home')"      id="nb-home">      <i class="ti ti-home"></i>Home</button>
    <button class="nb"    onclick="goPage('caddie')"    id="nb-caddie">    <i class="ti ti-message-circle"></i>Caddie</button>
    <button class="nb"    onclick="goPage('range')"     id="nb-range">     <i class="ti ti-run"></i>Range</button>
    <button class="nb"    onclick="goPage('shortgame')" id="nb-shortgame"> <i class="ti ti-target"></i>Short Game</button>
    <button class="nb"    onclick="goPage('mygame')"    id="nb-mygame">    <i class="ti ti-chart-line"></i>My Game</button>
  </nav>
</div>

<!-- Round tracking modal (full-screen) -->
<div id="round-modal">
  <div id="rm-header">
    <div>
      <div id="rm-label">Round Setup</div>
      <div id="rm-sub"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="rm-rt">
        <div id="rm-rt-score">0</div>
        <div id="rm-rt-diff">E</div>
      </div>
      <button id="rm-close-btn" onclick="closeRound()">✕</button>
    </div>
  </div>
  <div id="rm-body"></div>
  <div id="rm-footer"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="hole-cam" accept="image/*" capture="environment" style="display:none;" onchange="holePhotoSelected(this)">
<input type="file" id="hole-roll" accept="image/*" style="display:none;" onchange="holePhotoSelected(this)">

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://zairvjyiwhajsulefyoi.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphaXJ2anlpd2hhanN1bGVmeW9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDkxODAsImV4cCI6MjA5MTY4NTE4MH0.AAdJfqSGHMergPgL4tEoBMn0Wr5d8D1NuxhPMonp_60';
const CADDIE_URL    = 'https://spinvibes-caddie.spinvibes.workers.dev';
const WORKER_SECRET = 'sv-golf-2026-xK9mPqR4nBzT';
const SB_HDR = { 'Content-Type':'application/json', apikey: SUPABASE_ANON, Authorization:`Bearer ${SUPABASE_ANON}` };

// Supabase JS client — handles auth sessions automatically
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── STATE ────────────────────────────────────────────────────────
let profile = null, userId = null, rounds = [], caddieHistory = [];
let _authUser = null; // set when magic link auth succeeds
let _holes = [], _holeIdx = 0, _round = {}, _manYards = null, _caddieOpen = false, _caddieHist = [];
const DRAFT_KEY = () => 'sv-app-draft-' + (userId||'g');

// ── LABELS ───────────────────────────────────────────────────────
const GOAL  = { break100:'Break 100', break90:'Break 90', break80:'Break 80', consistency:'More Consistent', beginner:'Learn the Game', fun:'Have Fun', return:'Get Back Out There' };
const SKILL = { beginner:'Beginner', some:'Some Experience', mid:'Mid-Handicap', low:'Low Handicap', advanced:'Advanced' };
const HAND  = { l:'Left-handed', r:'Right-handed', left:'Left-handed', right:'Right-handed' };
const FREQ  = { rare:'2× / month', weekly:'Once a week', multi:'3× a week', daily:'Almost daily' };

// ── CLUBS (from profile distances or defaults) ───────────────────
function getClubs() {
  const d = profile?.distances || {};
  const defaults = { driver:190, '7wood':170, '4hybrid':165, '5iron':155, '6iron':148, '7iron':138, '8iron':128, '9iron':118, 'pw':105, 'gw':90, 'sw':80, 'lw':65 };
  return Object.assign({}, defaults, d);
}
function suggestClub(yds) {
  const clubs = getClubs();
  let best = null, bestDiff = 999;
  for (const [name, dist] of Object.entries(clubs)) {
    const diff = Math.abs(dist - yds);
    if (diff < bestDiff) { bestDiff = diff; best = { name, dist }; }
  }
  return best;
}

// ── BOOT ─────────────────────────────────────────────────────────
(async () => {
  const P = new URLSearchParams(location.search);
  const uuidParam = P.get('u');

  // Preview / URL-param mode
  if (!uuidParam || uuidParam === 'preview') {
    profile = { name: decodeURIComponent(P.get('n')||'Golfer'), hand: P.get('h')||'r', skill: P.get('s')||'mid', goal: P.get('g')||'fun', age: P.get('a')||'adult', weaknesses:[], freq:'weekly', equip:'full', bag:'', coaching_plan:null, distances:{} };
    userId = 'preview_' + Date.now();
    bootApp(); return;
  }

  // Check for active Supabase auth session (magic link lands here)
  const { data: { session } } = await _sb.auth.getSession();

  if (session) {
    // Authed user — load profile by auth_id
    _authUser = session.user;
    document.getElementById('loading-sub').textContent = 'Loading your profile…';
    try {
      const res  = await fetch(`${SUPABASE_URL}/rest/v1/guide_users?auth_id=eq.${session.user.id}&select=*&limit=1`, { headers: SB_HDR });
      const rows = await res.json();
      if (rows?.[0]) {
        profile = rows[0]; userId = profile.id;
        localStorage.setItem('sv-profile-'+userId, JSON.stringify(profile));
        bootApp(); return;
      }
    } catch(e) {}
    // Auth session exists but no profile linked yet — fall through to UUID load + link
  }

  // UUID link — guest mode (or post-magic-link with UUID still in URL)
  userId = uuidParam;
  const cached = localStorage.getItem('sv-profile-' + userId);
  if (cached) { try { profile = JSON.parse(cached); bootApp(); } catch(e) {} }
  try {
    const res  = await fetch(`${SUPABASE_URL}/rest/v1/guide_users?id=eq.${userId}&select=*&limit=1`, { headers: SB_HDR });
    const rows = await res.json();
    if (rows?.[0]) {
      profile = rows[0];
      localStorage.setItem('sv-profile-'+userId, JSON.stringify(profile));
      // If authed and profile not yet linked, link now
      if (session && !profile.auth_id) linkAuthToProfile(session.user.id);
      if (!cached) bootApp(); else renderHome();
    } else if (!cached) { showErr("Couldn't find your profile."); }
  } catch(e) { if (!cached) showErr("No signal — check connection."); }

  // Auth state listener — fires when magic link is clicked in email
  _sb.auth.onAuthStateChange(async (event, sess) => {
    if (event === 'SIGNED_IN' && sess) {
      _authUser = sess.user;
      if (userId && !userId.startsWith('preview_') && !profile?.auth_id) {
        await linkAuthToProfile(sess.user.id);
      }
      await migrateLocalRoundsToSupabase();
      updateAuthUI();
      renderHome(); // re-render to show auth status + hide nudge
    } else if (event === 'SIGNED_OUT') {
      _authUser = null;
      updateAuthUI();
    }
  });
})();

function showErr(m) {
  document.querySelector('#loading .spinner').style.display='none';
  document.querySelector('#loading .sub').style.display='none';
  const e=document.getElementById('load-err'); e.textContent=m; e.style.display='';
}

function bootApp() {
  const isPreview = !userId || userId.startsWith('preview_');
  // Effective PIN: Supabase-stored or locally-set
  const effectivePin = (!isPreview && (profile?.app_pin || localStorage.getItem('sv-pin-' + userId))) || null;
  if (effectivePin && !sessionStorage.getItem('sv-authed-' + userId)) {
    showPinGate(effectivePin); return;
  }
  _launchApp();
}

async function _launchApp() {
  rounds = await loadRounds();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
  renderHome(); renderCaddie(); renderRange(); renderShortGame(); renderMyGame();
  document.getElementById('tb-user').textContent = profile.name.toUpperCase();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  refreshResumeBanner();
  updateAuthUI();
}

let _gatePin = '';

function showPinGate(effectivePin) {
  document.getElementById('loading').style.display = 'none';

  el.id = 'pin-gate';
  el._pin = effectivePin;
  el.style.cssText = 'position:fixed;inset:0;background:var(--bg,#0d1a0f);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;z-index:9999;';
  el.innerHTML = `
    <div style="font-family:'Bebas Neue',Georgia,serif;font-size:1.8rem;color:var(--gold,#c9a84c);letter-spacing:4px;margin-bottom:4px;">SPINVIBES</div>

    <div style="font-size:0.82rem;color:var(--muted,#6a8a6e);margin-bottom:28px;">Welcome back, ${profile.name.split(' ')[0]}.</div>

    <div id="gate-dots" style="display:flex;gap:14px;margin-bottom:32px;">
      ${[0,1,2,3].map(i=>`<div id="gd-${i}" style="width:16px;height:16px;border-radius:50%;border:2px solid rgba(201,168,76,0.5);background:transparent;transition:background 0.15s;"></div>`).join('')}
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:260px;width:100%;margin:0 auto;">
      ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`
        <button onclick="gateKey('${k}')" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:18px 0;font-size:1.3rem;font-weight:600;color:var(--cream,#f0ead8);cursor:pointer;touch-action:manipulation;${k===''?'visibility:hidden;':''}" ${k===''?'disabled':''}>
          ${k}
        </button>`).join('')}
    </div>
    <div id="gate-err" style="height:20px;font-size:0.8rem;color:#d64f3a;margin-top:16px;"></div>
  `;
  document.body.appendChild(el);
  _gatePin = '';
}

function gateKey(k) {
  if (k === '⌫') {
    _gatePin = _gatePin.slice(0, -1);
  } else if (k !== '' && _gatePin.length < 4) {
    _gatePin += k;
  }
  for (let i=0;i<4;i++) {
    const d = document.getElementById('gd-'+i);
    if (d) d.style.background = i < _gatePin.length ? 'var(--gold,#c9a84c)' : 'transparent';
  }
  document.getElementById('gate-err').textContent = '';
  if (_gatePin.length === 4) {
    setTimeout(() => {
      if (_gatePin === document.getElementById('pin-gate')._pin) {
        sessionStorage.setItem('sv-authed-' + userId, '1');
        document.getElementById('pin-gate').remove();
        _launchApp();
      } else {
        document.getElementById('gate-err').textContent = 'Incorrect PIN — try again.';
        // Shake dots
        const dots = document.getElementById('gate-dots');
        dots.style.animation = 'none';
        dots.offsetHeight; // reflow
        dots.style.animation = 'sv-shake 0.35s ease';
        setTimeout(() => {
          _gatePin = '';
          for (let i=0;i<4;i++) { const d=document.getElementById('gd-'+i); if(d) d.style.background='transparent'; }
        }, 350);
      }
    }, 120);
  }
}

function setupKey(k) {
  if (k === '⌫') { _setupPin = _setupPin.slice(0,-1); }
  else if (k !== '' && _setupPin.length < 4) { _setupPin += k; }
  for (let i=0;i<4;i++) { const d=document.getElementById('psd-'+i); if(d) d.style.background = i<_setupPin.length?'var(--gold,#c9a84c)':'transparent'; }
  document.getElementById('ps-err').textContent = '';
  if (_setupPin.length === 4) {
    setTimeout(async () => {
      if (_setupPhase === 'set') {
        _setupFirst = _setupPin; _setupPin = ''; _setupPhase = 'confirm';
        document.getElementById('ps-title').textContent = 'Confirm your PIN';
        document.getElementById('ps-sub').textContent = 'Re-enter your PIN to confirm.';
        for (let i=0;i<4;i++) { const d=document.getElementById('psd-'+i); if(d) d.style.background='transparent'; }
      } else {
        if (_setupPin === _setupFirst) {
          // Save to localStorage immediately (works offline/without UPDATE RLS)
          localStorage.setItem('sv-pin-' + userId, _setupPin);
          // Best-effort PATCH to Supabase
          try {
            await fetch(`${SUPABASE_URL}/rest/v1/guide_users?id=eq.${userId}`, {
              method: 'PATCH',
              headers: { ...SB_HDR, Prefer: 'return=minimal' },
              body: JSON.stringify({ app_pin: _setupPin })
            });

          document.getElementById('pin-setup-modal').remove();
          showToast('PIN set — your app is now protected.');
          renderHome(); // hide the nudge card

          document.getElementById('ps-err').textContent = 'PINs don\'t match — try again.';
          _setupPin = ''; _setupFirst = ''; _setupPhase = 'set';
          document.getElementById('ps-title').textContent = 'Set your app PIN';
          document.getElementById('ps-sub').textContent = 'You\'ll enter this each time you open your app.';
          for (let i=0;i<4;i++) { const d=document.getElementById('psd-'+i); if(d) d.style.background='transparent'; }
        }
      }
    }, 120);
  }
}

// ── STRATEGY ─────────────────────────────────────────────────────

// ── ROUND TRACKING ───────────────────────────────────────────────
function lockBody()   { const s=window.scrollY; document.body.dataset.scrollY=s; document.body.style.cssText=`overflow:hidden;position:fixed;top:-${s}px;width:100%`; }
function unlockBody() { const s=parseInt(document.body.dataset.scrollY||0); document.body.style.cssText=''; window.scrollTo(0,s); }

function refreshResumeBanner() {
  const b = document.getElementById('resume-banner');
  if (!b) return;
  const d = loadDraft();
  if (d?.holes?.length > 0 && d.holeIdx < d.holes.length) {
    const hp = d.holeIdx+1;
    const tot = d.holes.slice(0,hp).reduce((a,h)=>a+h.score,0);
    document.getElementById('resume-sub').textContent = `${d.round.course||'Round'} · Hole ${hp} of ${d.holes.length} · Score: ${tot}`;
    b.style.display='';
  } else { b.style.display='none'; }
}

function openRound() {
  const draft = loadDraft();
  if (draft?.holes?.length > 0 && draft.holeIdx < draft.holes.length) {
    const hp = draft.holeIdx+1;
    const tot = draft.holes.slice(0,hp).reduce((a,h)=>a+h.score,0);
    if (confirm(`Resume round?\n\n${draft.round.course||'Round'} · Hole ${hp} of ${draft.holes.length}\nScore so far: ${tot}\n\nOK = resume · Cancel = new round`)) {
      _round=draft.round; _holes=draft.holes; _holeIdx=draft.holeIdx;
      _manYards=null; _caddieOpen=false; _caddieHist=[];
      lockBody();
      document.getElementById('round-modal').classList.add('on');
      document.getElementById('rm-rt').style.display='';
      renderHole(); return;
    } else { clearDraft(); }
  }
  // New round — show setup
  lockBody();
  document.getElementById('round-modal').classList.add('on');
  document.getElementById('rm-close-btn').style.display='';
  document.getElementById('rm-label').textContent='Round Setup';
  document.getElementById('rm-sub').style.display='none';
  document.getElementById('rm-rt').style.display='none';
  document.getElementById('rm-footer').style.display='none';
  renderSetup();
}

function closeRound() {
  if (_holes.length>0 && _holeIdx<_holes.length) {
    if (!confirm('Exit round? Your progress is saved — tap Start Round to resume.')) return;
    saveDraft();
  }
  document.getElementById('round-modal').classList.remove('on');
  unlockBody(); clearDraft(); refreshResumeBanner(); renderHome();
}

async function searchCourse() {
  const q=(document.getElementById('rs-search')?.value||'').trim();
  const st=document.getElementById('rs-status'), re=document.getElementById('rs-results');
  if (!q||q.length<2){if(st)st.textContent='Type at least 2 characters';return;}
  if(st)st.textContent='Searching…'; if(re)re.innerHTML='';
  try {
    const r=await fetch(CADDIE_URL+'/course-search',{method:'POST',headers:{'Content-Type':'application/json','X-SpinVibes-Token':WORKER_SECRET},body:JSON.stringify({query:q})});
    const d=await r.json();
    if(!r.ok||d.error){if(st)st.textContent=d.error||'Search failed';return;}
    const courses=d.courses||[];
    if(!courses.length){if(st)st.textContent='No courses found';return;}
    if(st)st.textContent=courses.length+' found — tap to select';
    re.innerHTML=courses.map(c=>{
      const loc=[c.city,c.state].filter(Boolean).join(', ');
      return `<div onclick="selectSetupCourse(${c.id},'${(c.name||'').replace(/'/g,"\\'")}','${loc.replace(/'/g,"\\'")}','${(c.course||'').replace(/'/g,"\\'")}' )" style="background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;touch-action:manipulation;">
        <div style="font-size:0.88rem;font-weight:600;color:var(--cream);">${c.name}</div>
        ${loc?`<div style="font-size:0.7rem;color:var(--muted);">${loc}</div>`:''}
      </div>`;
    }).join('');
  } catch(e){if(st)st.textContent='Network error';}
}
async function selectSetupCourse(id, name, loc, course) {
  const st=document.getElementById('rs-status'), re=document.getElementById('rs-results');
  if(st)st.textContent='Loading tee data…'; if(re)re.innerHTML='';
  try {
    const r=await fetch(CADDIE_URL+'/course-detail',{method:'POST',headers:{'Content-Type':'application/json','X-SpinVibes-Token':WORKER_SECRET},body:JSON.stringify({courseId:id,includeAllTeeHoles:true})});
    const d=await r.json();
    if(!r.ok||d.error){if(st)st.textContent=d.error||'Failed';return;}
    window._setupCourse={id,name,loc,course,data:d.course};
    if(st)st.textContent='';
    const sd=document.getElementById('rs-course-selected');
    if(sd){sd.style.display='';document.getElementById('rs-cname').textContent=name+(course?' — '+course:'');document.getElementById('rs-csub').textContent=loc||'';}
    // Tee selector
    const tees=d.course.allTees||[];
    const tw=document.getElementById('rs-tee-wrap'), tr=document.getElementById('rs-tees');
    if(tees.length&&tw&&tr){
      tw.style.display='';
      tr.innerHTML=tees.map((t,i)=>`<button onclick="selectSetupTee(this,'${t.name.replace(/'/g,"\\'")}',${i})" style="background:${i===0?'var(--gold)':'var(--surf2)'};border:${i===0?'none':'1px solid var(--border)'};border-radius:8px;padding:5px 12px;color:${i===0?'#1a1300':'var(--muted)'};font-size:0.75rem;font-weight:700;cursor:pointer;touch-action:manipulation;">${t.name}${t.yards?` <span style='opacity:0.6;font-weight:400;'>${t.yards}y</span>`:''}</button>`).join('');
      window._setupTee = tees[0]?.name||null;
    }
  } catch(e){if(st)st.textContent='Network error';}
}
function selectSetupTee(btn, name, idx) {
  window._setupTee=name;
  document.querySelectorAll('#rs-tees button').forEach((b,i)=>{
    b.style.background=i===idx?'var(--gold)':'var(--surf2)';
    b.style.color=i===idx?'#1a1300':'var(--muted)';
    b.style.border=i===idx?'none':'1px solid var(--border)';

function clearCourseSelection() {
  window._setupCourse=null; window._setupTee=null;
  const sd=document.getElementById('rs-course-selected'); if(sd)sd.style.display='none';

  const st=document.getElementById('rs-status'); if(st)st.textContent='';
}
function startRound() {
  const date  = document.getElementById('rs-date').value;
  const numH  = window._setupHoles||18;
  const cData = window._setupCourse;
  if (!cData) { showToast('Search and select a course first','error'); return; }
  const tee   = cData.data.allTees?.find(t=>t.name===window._setupTee)||cData.data.allTees?.[0]||null;
  const holePars = tee?.holePars||Array(numH).fill(4);
  const yardages = tee?.yardages||Array(numH).fill(null);
  _round = { date, course: cData.name+(cData.course?' — '+cData.course:''), par: (tee?.par||holePars.reduce((a,b)=>a+b,0)), tee: tee?.name||null };
  _holes = Array.from({length:numH},(_,i)=>({ hole:i+1, par:holePars[i]||4, score:holePars[i]||4, yds:yardages[i]||null, photos:[], putts:null, fairway:null, approachYds:null, approachClub:null }));
  _holeIdx=0; _manYards=null; _caddieOpen=false; _caddieHist=[];
  document.getElementById('rm-rt').style.display='';
  document.getElementById('rm-close-btn').style.display='none';
  saveDraft(); renderHole();
}

function adjScore(d) {
  const h=_holes[_holeIdx]; h.score=Math.max(1,h.score+d);
  const el=document.getElementById('h-score'); if(el) el.textContent=h.score;
  const played=_holes.slice(0,_holeIdx), run=played.reduce((a,x)=>a+x.score,0)+h.score;
  const vs=played.reduce((a,x)=>a+x.score-x.par,0)+(h.score-h.par);
  document.getElementById('rm-rt-score').textContent=run;
  const rtd=document.getElementById('rm-rt-diff'); rtd.textContent=vs===0?'E':vs>0?'+'+vs:String(vs); rtd.style.color=vs<0?'#60a5fa':vs===0?'var(--muted)':'#f87171';
}
function adjPar(d) { const h=_holes[_holeIdx]; h.par=Math.max(3,Math.min(5,h.par+d)); const el=document.getElementById('h-par'); if(el) el.textContent=h.par; }
function setYards(v) {
  _manYards=v&&v>0?v:null;
  const el=document.getElementById('h-yards'); if(el) el.textContent=_manYards||'—';
  const sl=document.getElementById('h-slider'); if(sl&&_manYards) sl.value=_manYards;
  const inp=document.getElementById('h-yards-in'); if(inp&&_manYards) inp.value=_manYards;
  // Update club suggestion
  const sug=_manYards?suggestClub(_manYards):null;
  const existing=document.querySelector('.club-suggest');
  if (sug) {
    const html=`<div style="font-size:0.6rem;font-weight:700;letter-spacing:1.5px;color:var(--muted);margin-bottom:2px;">CLUB SUGGESTION</div><div style="font-size:1.1rem;font-weight:700;color:var(--gold);">${sug.name.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())} <span style="font-size:0.78rem;color:var(--muted);font-weight:400;">(${sug.dist} yds)</span></div>`;
    if(existing){existing.style.display='block';existing.innerHTML=html;}
  }
}
function holeBack() { if(_holeIdx>0){_holeIdx--;_manYards=null;saveDraft();renderHole();} }
function nextHole() {
  _holes[_holeIdx].approachYds=_manYards; _holes[_holeIdx].approachClub=_manYards?suggestClub(_manYards)?.name:null;
  _manYards=null;
  if (_holeIdx===_holes.length-1) { clearDraft(); renderRoundSummary(); }
  else { _holeIdx++; saveDraft(); renderHole(); }
}

function toggleHoleCaddie() {
  _caddieOpen=!_caddieOpen;
  const p=document.getElementById('hc-panel'), c=document.getElementById('hc-caret');
  if(p) p.style.display=_caddieOpen?'block':'none';

}
function renderHoleCaddieMessages() {
  const el=document.getElementById('hc-msgs'); if(!el) return;
  const h=_holes[_holeIdx];
  const welcome=`<div class="msg s">Caddie ready. Hole ${h.hole}, Par ${h.par}. Ask anything.</div>`;
  el.innerHTML=welcome+_caddieHist.map(m=>`<div class="msg ${m.role==='user'?'u':'c'}">${esc(m.content)}</div>`).join('');

async function sendHoleCaddie() {
  const inp=document.getElementById('hc-input'), el=document.getElementById('hc-msgs');
  const msg=inp?.value.trim(); if(!msg) return;
  inp.value=''; inp.disabled=true;
  const p=profile, h=_holes[_holeIdx];
  const bagStr=p.bag||'standard set';
  const distStr=p.distances?Object.entries(p.distances).map(([k,v])=>`${k}:${v}yds`).join(','):'';
  const sys=`Caddie for ${p.name} (${HAND[p.hand]||'right-handed'}, ${SKILL[p.skill]||p.skill}). Now on Hole ${h.hole}, Par ${h.par}${h.yds?`, ${h.yds} yards`:''}. Bag: ${bagStr}${distStr?'. Distances: '+distStr:''}. 2-4 sentences. Lead with the recommendation.`;
  el.innerHTML+=`<div class="msg u">${esc(msg)}</div>`;
  const t=document.createElement('div'); t.className='msg c'; t.textContent='…'; el.appendChild(t); el.scrollTop=el.scrollHeight;
  _caddieHist.push({role:'user',content:msg}); if(_caddieHist.length>8) _caddieHist=_caddieHist.slice(-8);
  try {
    const r=await fetch(CADDIE_URL,{method:'POST',headers:{'Content-Type':'application/json','X-SpinVibes-Token':WORKER_SECRET},body:JSON.stringify({messages:_caddieHist,systemPrompt:sys})});
    const d=await r.json(); const rep=d.reply||'Try again.';
    _caddieHist.push({role:'assistant',content:rep}); t.textContent=rep;
  } catch(e){t.textContent='No signal.';}
  inp.disabled=false; el.scrollTop=el.scrollHeight;
}

function holePhotoSelected(input) {
  const file=input.files[0]; if(!file) return; input.value='';
  const reader=new FileReader();
  reader.onload=async e=>{
    const resized=await resizeImg(e.target.result,1200);
    _holes[_holeIdx].photos.push(resized); renderHole();
  };
  reader.readAsDataURL(file);
}
function removeHolePhoto(idx) { _holes[_holeIdx].photos.splice(idx,1); renderHole(); }
function showPhotoOverlay(src) {
  const o=document.createElement('div'); o.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;'; o.onclick=()=>o.remove();
  const img=document.createElement('img'); img.src=src; img.style.cssText='max-width:96vw;max-height:90vh;border-radius:10px;'; o.appendChild(img); document.body.appendChild(o);
}
async function resizeImg(dataUrl, maxPx) {
  return new Promise(res=>{
    const img=new Image(); img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',0.82));
    }; img.src=dataUrl;
  });
}

// ── DRAFT / STORAGE ──────────────────────────────────────────────
const RK = ()=>'sv-app-rounds-'+(userId||'g');

async function loadRounds() {
  if (_authUser) {
    try {
      const { data } = await _sb.from('user_rounds').select('*').order('date_played', { ascending: false }).limit(50);
      return data || [];
    } catch(e) {}
  }
  try { return JSON.parse(localStorage.getItem(RK()) || '[]'); } catch(e) { return []; }
}

async function persistRound(r) {
  if (_authUser) {
    try {
      await _sb.from('user_rounds').upsert({
        ...r, id: r.id || undefined,
        user_id: _authUser.id, guide_user_id: userId || null,
        date_played: r.date || new Date().toISOString().split('T')[0],
      });
      return;
    } catch(e) { console.warn('Supabase round save failed, falling back to localStorage', e); }
  }
  if (!rounds.find(x => x.id === r.id)) rounds.push(r);
  try { localStorage.setItem(RK(), JSON.stringify(rounds)); } catch(e) {}
}

function persistRounds() { try { localStorage.setItem(RK(), JSON.stringify(rounds)); } catch(e) {} }

// ── AUTH FUNCTIONS ───────────────────────────────────────────────
async function linkAuthToProfile(authId) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/guide_users?id=eq.${userId}`, {
      method: 'PATCH',
      headers: { ...SB_HDR, Authorization: `Bearer ${(await _sb.auth.getSession()).data.session?.access_token || SUPABASE_ANON}`, Prefer: 'return=minimal' },
      body: JSON.stringify({ auth_id: authId })
    });
    if (profile) { profile.auth_id = authId; localStorage.setItem('sv-profile-'+userId, JSON.stringify(profile)); }
  } catch(e) { console.warn('linkAuthToProfile failed', e); }
}

async function migrateLocalRoundsToSupabase() {
  const local = (() => { try { return JSON.parse(localStorage.getItem(RK()) || '[]'); } catch(e) { return []; } })();
  if (!local.length || !_authUser) return;
  for (const r of local) { await persistRound(r); }
  localStorage.removeItem(RK()); // clear local now that they're in Supabase
  rounds = await loadRounds();
  renderMyGame(); renderHome();
}

    const { error } = await _sb.auth.signInWithOtp({

    if (error) throw error;
    document.getElementById('auth-msg').innerHTML = `<strong style="color:var(--gold);">Check your email!</strong><br>We sent a magic link to <strong>${email}</strong>. Tap it to sign in — the link works for 60 minutes.`;
    btn.textContent = 'Sent ✓';
  } catch(e) {
    document.getElementById('auth-msg').textContent = 'Something went wrong — ' + (e.message || 'try again.');
    btn.disabled = false; btn.textContent = 'Send Magic Link';
  }
}
function saveDraft()    { try{localStorage.setItem(DRAFT_KEY(),JSON.stringify({round:_round,holes:_holes,holeIdx:_holeIdx,ts:Date.now()}));}catch(e){} }
function clearDraft()   { try{localStorage.removeItem(DRAFT_KEY());}catch(e){} }

// ── SHARE CARDS ───────────────────────────────────────────────────
let _svLogo = null;
async function _loadLogo() {
  if (_svLogo) return _svLogo;
  try { _svLogo = await _loadImg('/spinvibes_logo.png'); } catch(e) {}
  return _svLogo;
}
function _loadImg(src) {
  return new Promise((res,rej)=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>res(i);i.onerror=()=>res(null);i.src=src;});
}
function _mkCanvas(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return c;}
function _toBlob(c){return new Promise(r=>c.toBlob(r,'image/png'));}
function _imgCover(ctx,img,x,y,w,h){const ar=img.width/img.height;let dw=w,dh=h,dx=x,dy=y;if(ar>w/h){dh=h;dw=h*ar;dx=x-(dw-w)/2;}else{dw=w;dh=w/ar;dy=y-(dh-h)/2;}ctx.drawImage(img,dx,dy,dw,dh);}

async function _cardChrome(ctx,W,H,sf) {
  // Top vignette
  const g=ctx.createLinearGradient(0,0,0,H*0.22);g.addColorStop(0,'rgba(0,0,0,0.45)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Logo
  const logo=await _loadLogo();
  if (logo){const lw=Math.round(200*sf),lh=Math.round(lw*(logo.height/logo.width)),pad=Math.round(22*sf);ctx.drawImage(logo,W-lw-pad,pad,lw,lh);}
  // Gold frame
  ctx.strokeStyle='#c9a84c';ctx.lineWidth=Math.round(4*sf);const fi=Math.round(10*sf);ctx.strokeRect(fi,fi,W-fi*2,H-fi*2);
}
function _botGrad(ctx,H){const g=ctx.createLinearGradient(0,H*0.60,0,H);g.addColorStop(0,'rgba(10,14,8,0)');g.addColorStop(0.45,'rgba(10,14,8,0.72)');g.addColorStop(1,'rgba(10,14,8,0.97)');return g;}
function _rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

async function _drawCollage(ctx,W,H,photos){
  const MAX=9,count=Math.min(photos.length,MAX);
  const disp=photos.length>MAX?Array.from({length:MAX},(_,i)=>photos[Math.floor(i*photos.length/MAX)]):photos.slice(0,count);
  const cols=count===1?1:count<=4?2:3,rows=Math.ceil(count/cols),cw=W/cols,ch=H/rows;
  const imgs=await Promise.all(disp.map(p=>_loadImg(p)));
  imgs.forEach((img,i)=>{
    if(!img)return;const col=i%cols,row=Math.floor(i/cols);
    const rowStart=row*cols,inRow=Math.min(cols,count-rowStart),ox=inRow<cols?(W-inRow*cw)/2:0;
    ctx.save();ctx.beginPath();ctx.rect(ox+col*cw,row*ch,cw,ch);ctx.clip();_imgCover(ctx,img,ox+col*cw,row*ch,cw,ch);ctx.restore();
  });
}

// Template 1: Full scorecard card
async function buildScorecardCard(roundData) {
  const W=720,H=1280,sf=0.76;
  const canvas=_mkCanvas(W,H); const ctx=canvas.getContext('2d');
  const holes=roundData.holeData||[];
  const photos=holes.flatMap(h=>h.photo?[h.photo]:[]).filter(p=>p&&(p.startsWith('http')||p.startsWith('data:')));
  ctx.fillStyle='#0d1a0a';ctx.fillRect(0,0,W,H);
  const photoH=Math.round(H*0.36);
  if(photos.length){ctx.save();ctx.beginPath();ctx.rect(0,0,W,photoH);ctx.clip();await _drawCollage(ctx,W,photoH,photos);ctx.restore();}
  const fade=ctx.createLinearGradient(0,photoH*0.45,0,photoH+40);fade.addColorStop(0,'rgba(13,26,10,0)');fade.addColorStop(1,'rgba(13,26,10,1)');ctx.fillStyle=fade;ctx.fillRect(0,0,W,photoH+40);

  // Course + date
  let y=photoH;
  ctx.textAlign='center';
  ctx.fillStyle='#f5f0e8';ctx.font=`500 ${Math.round(40*sf)}px "Bebas Neue",Impact,Arial`;ctx.fillText((roundData.course||'').toUpperCase(),W/2,y);y+=Math.round(26*sf);
  ctx.fillStyle='rgba(255,255,255,0.38)';ctx.font=`400 ${Math.round(16*sf)}px Outfit,Arial`;ctx.fillText(`${roundData.date||''} · Par ${roundData.par||72}`,W/2,y);y+=Math.round(18*sf);
  ctx.strokeStyle='rgba(201,168,76,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(36,y);ctx.lineTo(W-36,y);ctx.stroke();y+=10;

  // Score grid (front 9 + back 9)
  const front=holes.slice(0,9),back=holes.slice(9,18);
  function drawGrid(hs,startY,label){
    const pad=24,nameW=44,subW=34,holeW=(W-pad*2-nameW-subW)/hs.length,rowH=Math.round(24*sf);
    ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(pad,startY,W-pad*2,rowH);
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font=`400 ${Math.round(11*sf)}px Outfit,Arial`;ctx.textAlign='center';
    hs.forEach((h,i)=>ctx.fillText(String(h.hole),pad+nameW+i*holeW+holeW/2,startY+rowH*0.72));
    ctx.fillText(label,pad+nameW+hs.length*holeW+subW/2,startY+rowH*0.72);
    const parY=startY+rowH;
    ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fillRect(pad,parY,W-pad*2,rowH);
    ctx.fillStyle='rgba(255,255,255,0.28)';ctx.font=`400 ${Math.round(11*sf)}px Outfit,Arial`;ctx.textAlign='left';ctx.fillText('PAR',pad+4,parY+rowH*0.72);
    hs.forEach((h,i)=>{ctx.textAlign='center';ctx.fillText(String(h.par),pad+nameW+i*holeW+holeW/2,parY+rowH*0.72);});
    const parSub=hs.reduce((a,h)=>a+h.par,0);ctx.fillText(String(parSub),pad+nameW+hs.length*holeW+subW/2,parY+rowH*0.72);
    const rowY=parY+rowH;
    ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fillRect(pad,rowY,W-pad*2,rowH);
    ctx.fillStyle='#c9a84c';ctx.font=`500 ${Math.round(11.5*sf)}px Outfit,Arial`;ctx.textAlign='left';ctx.fillText(profile.name.slice(0,6),pad+4,rowY+rowH*0.72);
    hs.forEach((h,i)=>{
      const d=h.score-h.par,col=d<=-1?'#60a5fa':d===0?'rgba(255,255,255,0.7)':'#f87171';
      ctx.fillStyle=col;ctx.font=`500 ${Math.round(12*sf)}px Outfit,Arial`;ctx.textAlign='center';ctx.fillText(String(h.score),pad+nameW+i*holeW+holeW/2,rowY+rowH*0.72);
    });
    const sub=hs.reduce((a,h)=>a+h.score,0);const subD=sub-hs.reduce((a,h)=>a+h.par,0);
    ctx.fillStyle=subD<0?'#60a5fa':subD===0?'rgba(255,255,255,0.6)':'#f87171';ctx.font=`500 ${Math.round(12.5*sf)}px Outfit,Arial`;ctx.textAlign='center';ctx.fillText(String(sub),pad+nameW+hs.length*holeW+subW/2,rowY+rowH*0.72);
    return rowY+rowH;
  }

  y=drawGrid(front,y,'OUT')+Math.round(6*sf);
  if(back.length) y=drawGrid(back,y,'IN')+Math.round(12*sf);

  ctx.strokeStyle='rgba(201,168,76,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(36,y);ctx.lineTo(W-36,y);ctx.stroke();y+=Math.round(14*sf);

  // Total score
  const total=roundData.total,par=roundData.par||72,diff=total-par;
  const diffStr=diff===0?'E':diff>0?'+'+diff:String(diff);
  const diffC=diff<0?'#60a5fa':diff===0?'#6ec98a':'#f87171';
  ctx.textAlign='center';
  ctx.fillStyle='rgba(10,14,8,0.55)';_rr(ctx,(W-200)/2,y,200,Math.round(80*sf),12);ctx.fill();
  ctx.fillStyle='#f5f0e8';ctx.font=`500 ${Math.round(58*sf)}px "Bebas Neue",Impact,Arial`;ctx.fillText(String(total),W/2,y+Math.round(56*sf));
  ctx.fillStyle=diffC;ctx.font=`500 ${Math.round(18*sf)}px Outfit,Arial`;ctx.fillText(diffStr,W/2,y+Math.round(74*sf));

  await _cardChrome(ctx,W,H,sf);
  return _toBlob(canvas);
}

// Template 2: Hole highlight
async function buildHoleCard(holeData,roundData){
  const W=720,H=1280,sf=0.76;const canvas=_mkCanvas(W,H);const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0d1a0a';ctx.fillRect(0,0,W,H);
  if(holeData.photo){const img=await _loadImg(holeData.photo);if(img)_imgCover(ctx,img,0,0,W,H);}
  ctx.fillStyle=_botGrad(ctx,H);ctx.fillRect(0,0,W,H);
  const SAFE=Math.round(18*sf);
  ctx.fillStyle='rgba(10,14,8,0.58)';_rr(ctx,SAFE,SAFE,Math.round(180*sf),Math.round(34*sf),8);ctx.fill();
  ctx.fillStyle='#c9a84c';ctx.font=`500 ${Math.round(14*sf)}px Outfit,Arial`;ctx.textAlign='left';ctx.fillText(`Hole ${holeData.hole}  ·  Par ${holeData.par}`,SAFE+12,SAFE+Math.round(24*sf));
  // Score chip
  const sc=holeData.score,diff=sc-holeData.par,diffStr=diff===0?'E':diff>0?'+'+diff:String(diff);
  const scCol=diff<=-2?'#a78bfa':diff===-1?'#fbbf24':diff===0?'#6ec98a':'#f87171';
  const chipW=Math.round(180*sf),chipH=Math.round(140*sf),chipX=(W-chipW)/2,chipY=H-Math.round(32*sf)-Math.round(50*sf)-chipH;
  ctx.fillStyle='rgba(10,14,8,0.65)';_rr(ctx,chipX,chipY,chipW,chipH,14);ctx.fill();
  ctx.fillStyle=scCol;ctx.strokeStyle=scCol;ctx.lineWidth=2;_rr(ctx,chipX,chipY,chipW,chipH,14);ctx.stroke();
  ctx.textAlign='center';const mx=chipX+chipW/2;
  ctx.fillStyle='rgba(255,255,255,0.65)';ctx.font=`500 ${Math.round(15*sf)}px Outfit,Arial`;ctx.fillText(profile.name,mx,chipY+chipH*0.28);
  ctx.fillStyle=scCol;ctx.font=`500 ${Math.round(60*sf)}px "Bebas Neue",Impact,Arial`;ctx.fillText(String(sc),mx,chipY+chipH*0.73);
  const achv=diff<=-2?'EAGLE':diff===-1?'BIRDIE':diff===0?'PAR':null;
  ctx.fillStyle=achv?'#fbbf24':'rgba(255,255,255,0.4)';ctx.font=`400 ${Math.round(13*sf)}px Outfit,Arial`;ctx.fillText(achv||diffStr,mx,chipY+chipH*0.92);
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font=`400 ${Math.round(13*sf)}px Outfit,Arial`;ctx.fillText(`${(roundData.course||'').toUpperCase()}  ·  ${roundData.date||''}`,W/2,H-Math.round(20*sf));
  await _cardChrome(ctx,W,H,sf);return _toBlob(canvas);
}

// Share picker
function showSharePicker(roundData) {
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  const sheet=document.createElement('div');
  sheet.style.cssText='width:100%;background:var(--surf);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));';
  const holes=(roundData.holeData||[]).filter(h=>h.photo&&(h.photo.startsWith('http')||h.photo.startsWith('data:')));
  sheet.innerHTML=`
    <div style="width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 14px;"></div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:var(--cream);margin-bottom:14px;">Share Round</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button onclick="doShare('scorecard',${JSON.stringify(roundData).replace(/"/g,'&quot;')});this.closest('[style*=fixed]').remove();" style="background:var(--surf2);border:1px solid rgba(201,168,76,0.2);border-radius:14px;padding:16px;text-align:left;cursor:pointer;color:var(--cream);touch-action:manipulation;">
        <div style="font-weight:700;font-size:0.95rem;margin-bottom:3px;">&#x1F4CA; Full Scorecard</div>
        <div style="font-size:0.78rem;color:var(--muted);">All holes · hole photos as collage</div>
      </button>
      ${holes.length?`<button onclick="showHolePicker(${JSON.stringify(roundData).replace(/"/g,'&quot;')});this.closest('[style*=fixed]').remove();" style="background:var(--surf2);border:1px solid rgba(201,168,76,0.2);border-radius:14px;padding:16px;text-align:left;cursor:pointer;color:var(--cream);touch-action:manipulation;">
        <div style="font-weight:700;font-size:0.95rem;margin-bottom:3px;">&#x1F4F8; Hole Highlight</div>
        <div style="font-size:0.78rem;color:var(--muted);">Pick a hole · score overlaid on photo</div>
      </button>`:''}
    </div>`;
  overlay.appendChild(sheet);document.body.appendChild(overlay);
}

function showHolePicker(roundData){
  const holes=(roundData.holeData||[]).filter(h=>h.photo&&(h.photo.startsWith('http')||h.photo.startsWith('data:')));
  const overlay=document.createElement('div');overlay.style.cssText='position:fixed;inset:0;z-index:9600;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;';overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  const sheet=document.createElement('div');sheet.style.cssText='width:100%;background:var(--surf);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));max-height:80dvh;overflow-y:auto;';
  sheet.innerHTML=`<div style="width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 14px;"></div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--cream);margin-bottom:14px;">Pick a Hole</div>`+
    holes.map(h=>`<div onclick="doShare('hole',${JSON.stringify(roundData).replace(/"/g,'&quot;')},${h.hole});this.closest('[style*=fixed]').remove();" style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer;touch-action:manipulation;">
      <img src="${h.photo}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0;">
      <div style="flex:1;"><div style="font-weight:700;font-size:0.88rem;color:var(--cream);">Hole ${h.hole} · Par ${h.par}</div><div style="font-size:0.75rem;color:var(--muted);margin-top:2px;">${h.score} strokes (${h.score-h.par===0?'Par':h.score-h.par>0?'+':''}${h.score-h.par===0?'':h.score-h.par})</div></div>
      <div style="color:var(--gold);">›</div>
    </div>`).join('');
  overlay.appendChild(sheet);document.body.appendChild(overlay);
}

async function doShare(template, roundData, holeNum) {
  const btn=document.getElementById('share-btn-'+roundData.id);
  if(btn){btn.disabled=true;btn.textContent='Building…';}
  try {
    let blob;
    if(template==='scorecard') blob=await buildScorecardCard(roundData);
    else if(template==='hole'){
      const h=(roundData.holeData||[]).find(x=>x.hole===holeNum);
      if(h) blob=await buildHoleCard(h,roundData);
    }
    if(!blob) return;
    const objUrl=URL.createObjectURL(blob);
    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;z-index:9800;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;';
    overlay.innerHTML=`<img src="${objUrl}" style="max-width:100%;max-height:70dvh;border-radius:10px;object-fit:contain;">
      <div style="display:flex;gap:10px;width:100%;max-width:360px;">
        <button onclick="this.closest('[style*=fixed]').remove();URL.revokeObjectURL('${objUrl}')" style="flex:1;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:14px;color:#fff;font-family:Outfit,sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;touch-action:manipulation;">Cancel</button>
        <button id="sv-share-ok" style="flex:2;background:var(--green);border:none;border-radius:12px;padding:14px;color:#e8f5ec;font-family:Outfit,sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;touch-action:manipulation;">Share →</button>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('sv-share-ok').onclick=async()=>{
      overlay.remove();
      const fname=`spinvibes-${(roundData.course||'round').replace(/\s+/g,'-').toLowerCase()}.png`;
      try{const f=new File([blob],fname,{type:'image/png'});if(navigator.canShare&&navigator.canShare({files:[f]})){await navigator.share({files:[f],title:'SpinVibes Golf'});URL.revokeObjectURL(objUrl);return;}}catch(e){}
      const a=document.createElement('a');a.href=objUrl;a.download=fname;a.click();setTimeout(()=>URL.revokeObjectURL(objUrl),5000);
    };
  } catch(e){console.warn('Share error:',e);}
  finally{if(btn){btn.disabled=false;btn.textContent='&#x1F4E4; Share';}}
}

// ── UTILS ────────────────────────────────────────────────────────
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,type) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.style.background=type==='error'?'rgba(192,57,43,0.9)':'var(--surf2)';
  t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2200);
}
