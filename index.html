  const holes=(roundData.holeData||[]).filter(h=>h.photo&&(h.photo.startsWith('http')||h.photo.startsWith('data:')));
  sheet.innerHTML=`
    <div style="width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 14px;"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div style="font-family:'Archivo',sans-serif;font-weight:800;letter-spacing:2px;font-size:1.2rem;color:var(--cream);">Share Round</div>
      <button onclick="this.closest('[style*=fixed]').remove();" style="background:none;border:none;color:var(--muted);font-size:1.3rem;line-height:1;cursor:pointer;touch-action:manipulation;">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button onclick="doShare('scorecard',${JSON.stringify(roundData).replace(/"/g,'&quot;')});this.closest('[style*=fixed]').remove();" style="background:var(--surf2);border:1px solid rgba(201,168,76,0.2);border-radius:14px;padding:16px;text-align:left;cursor:pointer;color:var(--cream);touch-action:manipulation;">
        <div style="font-weight:700;font-size:0.95rem;margin-bottom:3px;">&#x1F4CA; Full Scorecard</div>
        <div style="font-size:0.78rem;color:var(--muted);">All holes · hole photos as collage</div>
      </button>
      ${holes.length?`<button onclick="showHolePicker(${JSON.stringify(roundData).replace(/"/g,'&quot;')});this.closest('[style*=fixed]').remove();" style="background:var(--surf2);border:1px solid rgba(201,168,76,0.2);border-radius:14px;padding:16px;text-align:left;cursor:pointer;color:var(--cream);touch-action:manipulation;">
        <div style="font-weight:700;font-size:0.95rem;margin-bottom:3px;">&#x1F4F8; Hole Highlight</div>
        <div style="font-size:0.78rem;color:var(--muted);">Pick a hole · score overlaid on photo</div>
      </button>`:''}
    </div>`;
  overlay.appendChild(sheet);document.body.appendChild(overlay);
}

function showHolePicker(roundData){
  const holes=(roundData.holeData||[]).filter(h=>h.photo&&(h.photo.startsWith('http')||h.photo.startsWith('data:')));
  const overlay=document.createElement('div');overlay.style.cssText='position:fixed;inset:0;z-index:9600;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;';overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  const sheet=document.createElement('div');sheet.style.cssText='width:100%;background:var(--surf);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));max-height:80dvh;overflow-y:auto;';
  sheet.innerHTML=`<div style="width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 14px;"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div style="font-family:'Archivo',sans-serif;font-weight:800;letter-spacing:2px;font-size:1.1rem;color:var(--cream);">Pick a Hole</div>
      <button onclick="this.closest('[style*=fixed]').remove();" style="background:none;border:none;color:var(--muted);font-size:1.3rem;line-height:1;cursor:pointer;touch-action:manipulation;">✕</button>
    </div>`+
    holes.map(h=>`<div onclick="doShare('hole',${JSON.stringify(roundData).replace(/"/g,'&quot;')},${h.hole});this.closest('[style*=fixed]').remove();" style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer;touch-action:manipulation;">
      <img src="${h.photo}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0;">
      <div style="flex:1;"><div style="font-weight:700;font-size:0.88rem;color:var(--cream);">Hole ${h.hole} · Par ${h.par}</div><div style="font-size:0.75rem;color:var(--muted);margin-top:2px;">${h.score} strokes (${h.score-h.par===0?'Par':h.score-h.par>0?'+':''}${h.score-h.par===0?'':h.score-h.par})</div></div>
      <div style="color:var(--gold);">›</div>
    </div>`).join('');
  overlay.appendChild(sheet);document.body.appendChild(overlay);
}

async function doShare(template, roundData, holeNum) {
  const btn=document.getElementById('share-btn-'+roundData.id);
  if(btn){btn.disabled=true;btn.textContent='Building…';}
  try {
    let blob;
    if(template==='scorecard') blob=await buildScorecardCard(roundData);
    else if(template==='hole'){
      const h=(roundData.holeData||[]).find(x=>x.hole===holeNum);
      if(h) blob=await buildHoleCard(h,roundData);
    }
    if(!blob) return;
    const objUrl=URL.createObjectURL(blob);
    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;z-index:9800;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;';
    overlay.innerHTML=`<img src="${objUrl}" style="max-width:100%;max-height:70dvh;border-radius:10px;object-fit:contain;">
      <div style="display:flex;gap:10px;width:100%;max-width:360px;">
        <button onclick="this.closest('[style*=fixed]').remove();URL.revokeObjectURL('${objUrl}')" style="flex:1;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:14px;color:#fff;font-family:Archivo,sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;touch-action:manipulation;">Cancel</button>
        <button id="sv-share-ok" style="flex:2;background:var(--green);border:none;border-radius:12px;padding:14px;color:#e8f5ec;font-family:Archivo,sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;touch-action:manipulation;">Share →</button>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('sv-share-ok').onclick=async()=>{
      overlay.remove();
      const fname=`spinvibes-${(roundData.course||'round').replace(/\s+/g,'-').toLowerCase()}.png`;
      try{const f=new File([blob],fname,{type:'image/png'});if(navigator.canShare&&navigator.canShare({files:[f]})){await navigator.share({files:[f],title:'SpinVibes Golf'});URL.revokeObjectURL(objUrl);return;}}catch(e){}
      const a=document.createElement('a');a.href=objUrl;a.download=fname;a.click();setTimeout(()=>URL.revokeObjectURL(objUrl),5000);
    };
  } catch(e){console.warn('Share error:',e);}
  finally{if(btn){btn.disabled=false;btn.textContent='&#x1F4E4; Share';}}
}

// ── UTILS ────────────────────────────────────────────────────────
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// Lightweight markdown → HTML (headings, bold/italic, bullet + numbered lists, paragraphs)
function mdToHtml(md){
  if(!md) return '';
  const e=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inline=t=>e(t)
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/__([^_]+)__/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*(?!\s)([^*]+?)\*/g,'$1<em>$2</em>');
  const lines=String(md).replace(/\r\n/g,'\n').split('\n');
  let html='',list=null;
  const close=()=>{ if(list){ html+='</'+list+'>'; list=null; } };
  for(const raw of lines){
    const line=raw.trim();
    if(!line){ close(); continue; }
    let m;
    if((m=line.match(/^(#{1,4})\s+(.*)$/))){ close(); html+='<div class="md-h md-h'+m[1].length+'">'+inline(m[2].replace(/[#\s]+$/,''))+'</div>'; continue; }
    if((m=line.match(/^[-*•]\s+(.*)$/))){ if(list!=='ul'){close();html+='<ul class="md-ul">';list='ul';} html+='<li>'+inline(m[1])+'</li>'; continue; }
    if((m=line.match(/^\d+[.)]\s+(.*)$/))){ if(list!=='ol'){close();html+='<ol class="md-ol">';list='ol';} html+='<li>'+inline(m[1])+'</li>'; continue; }
    close(); html+='<p class="md-p">'+inline(line)+'</p>';
  }
  close();
  return html;
}
function showToast(msg,type) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.style.background=type==='error'?'rgba(192,57,43,0.9)':'var(--surf2)';
  t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2200);
}
