<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#13291C">
  <title>SpinVibes Golf</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      /* ── Fable design system: forest ink chrome · white field · kelly green action ── */
      --bg:      #ffffff;
      --surf:    #F3F7F3;
      --surf2:   #EBF1EB;
      --surf3:   #E0E9E0;
      --border:  #E4EAE4;
      --ink:     #13291C;
      --cream:   #13291C;
      --muted:   #6B7A6E;
      --gold:    #D4A843;
      --gold-l:  #b8922e;
      --green:   #249657;
      --green-b: #1E7F4A;
      --red:     #c0392b;
    }
    /* DARK MODE — toggled via .sv-dark on body (Fable ink-green family) */
    body.sv-dark {
      --bg:      #0f1f15;
      --surf:    #16291d;
      --surf2:   #1d3325;
      --surf3:   #243d2c;
      --border:  rgba(255,255,255,0.09);
      --ink:     #0c1a11;
      --cream:   #EDF3ED;
      --muted:   #8DA391;
      --gold:    #D4A843;
      --gold-l:  #e0bc62;
      --green:   #2BAA65;
      --green-b: #249657;
      --red:     #d65b4a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--cream); font-family: 'Archivo', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; }

    /* LOADING */
    #loading { position: fixed; inset: 0; background: var(--ink); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 9999; }
    #loading .logo { font-family: 'Archivo', sans-serif; font-weight: 800; letter-spacing: -0.5px; font-size: 2.2rem; color: #FFFFFF; }
    #loading .sub  { font-size: 0.75rem; color: rgba(255,255,255,0.55); letter-spacing: 2px; text-transform: uppercase; }
    #loading .spinner { width: 36px; height: 36px; border: 3px solid rgba(201,168,76,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes sv-shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
    #loading .err { font-size: 0.85rem; color: #e87070; text-align: center; max-width: 280px; line-height: 1.5; display: none; }

    /* APP SHELL */
    #app { display: none; flex-direction: column; height: 100dvh; max-width: 500px; margin: 0 auto; }

    /* TOPBAR — Fable ink chrome */
    .topbar { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; padding-top: calc(12px + env(safe-area-inset-top,0px)); border-bottom: none; background: var(--ink); }
    .tb-brand { font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 1.15rem; letter-spacing: -0.2px; color: #FFFFFF; line-height: 1; }
    .tb-user  { font-size: 0.65rem; color: rgba(255,255,255,0.55); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }
    .tb-btn   { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); border-radius: 20px; padding: 5px 9px; font-size: 0.9rem; cursor: pointer; color: #fff; touch-action: manipulation; }

    /* PAGES */
    .pages { flex: 1; overflow: hidden; position: relative; }
    .page { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding: 16px 16px calc(76px + env(safe-area-inset-bottom,0px)); display: none; }
    .page.on { display: block; }

    /* NAV — Fable: white bar, sentence case, ink active, center kelly Play */
    .nav { flex-shrink: 0; display: flex; align-items: center; height: calc(54px + env(safe-area-inset-bottom,0px)); background: var(--bg); border-top: 0.5px solid var(--border); padding-bottom: env(safe-area-inset-bottom,0px); }
    .nb { flex: 1 1 0; min-width: 0; height: 54px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 0 2px; background: none; border: none; color: #9AA89D; font-family: 'Archivo', sans-serif; font-size: 0.58rem; font-weight: 600; letter-spacing: 0.1px; text-transform: none; cursor: pointer; touch-action: manipulation; transition: color 0.15s; }
    .nb i { font-size: 21px; line-height: 1; }
    .nb.on { color: var(--ink); font-weight: 700; }
    body.sv-dark .nav { background: var(--surf); }
    body.sv-dark .nb.on { color: var(--cream); }
    .nav-play { flex: 0 0 auto; width: 46px; height: 46px; margin: 0 6px; border-radius: 50%; border: none; background: var(--green); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; font-family: 'Archivo', sans-serif; font-size: 0.44rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; box-shadow: 0 2px 8px rgba(19,41,28,0.28); touch-action: manipulation; }
    .nav-play i { font-size: 18px; line-height: 1; }
    .nav-play:active { transform: scale(0.94); opacity: 0.9; }
    /* Profile switcher — horizontal pills under the topbar, shown only with family */
    .psw { flex-shrink: 0; display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 9px 14px; background: var(--bg); border-bottom: 0.5px solid var(--border); scrollbar-width: none; }
    .psw::-webkit-scrollbar { display: none; }
    body.sv-dark .psw { background: var(--surf); }
    .psw-pill { flex: 0 0 auto; display: flex; align-items: center; gap: 7px; padding: 5px 13px 5px 5px; border-radius: 999px; border: 1px solid var(--border); background: var(--surf2,transparent); color: var(--muted); font-family: 'Archivo', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; touch-action: manipulation; white-space: nowrap; transition: all 0.15s; }
    .psw-pill.on { border-color: var(--green); color: var(--cream); background: rgba(36,150,87,0.12); }
    .psw-av { width: 24px; height: 24px; border-radius: 50%; background: var(--gold,#c9a84c); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 800; flex-shrink: 0; }
    .psw-av.kid { background: #3b82f6; }
    .psw-pill.on .psw-av { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3.5px var(--green); }

    /* COMPONENTS */
    .hero { background: var(--ink); border-radius: 16px; padding: 20px; margin-bottom: 14px; border: none; }
    .hero-hi   { font-size: 0.62rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
    .hero-name { font-family: 'Archivo', sans-serif; font-weight: 800; letter-spacing: -0.5px; font-size: 2.4rem; line-height: 1; color: #FFFFFF; margin-bottom: 4px; }
    .hero-goal { font-size: 0.88rem; color: #7BD4A0; font-weight: 600; margin-bottom: 10px; }
    .hero-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16); border-radius: 20px; padding: 3px 10px; font-size: 0.68rem; font-weight: 600; color: rgba(255,255,255,0.85); }
    .pill.g { background: rgba(36,150,87,0.25); border-color: rgba(36,150,87,0.45); color: #7BD4A0; }

    .sec-title { font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin: 18px 0 8px; }
    .back-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--surf2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 13px 6px 10px; color: var(--muted); font-family: 'Archivo', sans-serif; font-size: 0.74rem; font-weight: 700; cursor: pointer; margin-bottom: 12px; touch-action: manipulation; }
    .back-chip i { font-size: 1rem; line-height: 1; }
    .back-chip:active { opacity: 0.7; }
    .card { background: var(--surf); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid var(--border); }
    .card-title { font-weight: 700; font-size: 0.88rem; color: var(--cream); margin-bottom: 4px; }
    .card-body  { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

    .stats-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .stat { flex: 1; background: var(--surf); border-radius: 10px; padding: 11px 8px; text-align: center; border: 1px solid var(--border); }
    .stat-n { font-family: 'Archivo', sans-serif; font-weight: 800; letter-spacing: -0.5px; font-size: 1.6rem; color: var(--cream); line-height: 1; }
    .stat-l { font-size: 0.56rem; color: var(--muted); font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .qc { background: var(--surf); border-radius: 14px; padding: 16px 14px; border: 1px solid var(--border); cursor: pointer; touch-action: manipulation; transition: background 0.1s; }
    .qc:active { background: var(--surf2); }
    .qc-icon { font-size: 1.4rem; color: var(--green); margin-bottom: 6px; }
    .qc-title { font-weight: 700; font-size: 0.85rem; color: var(--cream); }
    .qc-sub   { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

    /* CADDIE */
    /* Caddie fills the page area (between topbar and nav) so the input row is always visible above the nav */
    #pg-caddie.on { display: flex; flex-direction: column; padding-bottom: calc(10px + env(safe-area-inset-bottom,0px)); }
    .caddie-outer { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; }
    .caddie-msgs { flex: 1 1 auto; min-height: 0; overflow-y: auto; overscroll-behavior: contain; display: flex; flex-direction: column; gap: 10px; padding-bottom: 10px; }
    .msg { padding: 10px 14px; border-radius: 12px; font-size: 0.87rem; line-height: 1.55; max-width: 88%; }
    .msg.u { background: var(--green); color: #e8f5ec; align-self: flex-end; border-radius: 12px 12px 2px 12px; }
    .msg.c { background: var(--surf2); color: var(--cream); align-self: flex-start; border-radius: 12px 12px 12px 2px; border: 1px solid var(--border); }
    .msg.s { background: rgba(201,168,76,0.08); color: var(--muted); align-self: center; font-size: 0.74rem; border: 1px solid rgba(201,168,76,0.15); border-radius: 8px; text-align: center; max-width: 100%; }
    .caddie-row { display: flex; gap: 8px; padding-top: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .caddie-row textarea { flex: 1; background: var(--surf2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--cream); font-family: 'Archivo',sans-serif; font-size: 0.87rem; resize: none; outline: none; }
    .caddie-row button { background: var(--green); border: none; border-radius: 10px; padding: 10px 16px; color: #e8f5ec; font-weight: 700; cursor: pointer; touch-action: manipulation; }

    /* BUTTONS */
    .btn-gold  { background: var(--green); border: none; border-radius: 12px; padding: 14px 20px; color: #ffffff; font-family: 'Archivo',sans-serif; font-size: 0.92rem; font-weight: 700; cursor: pointer; touch-action: manipulation; }
    .btn-ghost { background: none; border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; color: var(--cream); font-family: 'Archivo',sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; touch-action: manipulation; }
    .mi { width: 100%; background: var(--surf2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--cream); font-family: 'Archivo',sans-serif; font-size: 0.92rem; outline: none; margin-bottom: 12px; }
    .ml { font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }

    /* ROUND MODAL (full-screen) */
    #round-modal { display: none; position: fixed; inset: 0; z-index: 500; background: var(--bg); flex-direction: column; padding-top: env(safe-area-inset-top,0px); }
    #round-modal.on { display: flex; }
    #rm-header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); touch-action: none; }
    #rm-label  { font-family: 'Archivo', sans-serif; font-weight: 800; letter-spacing: -0.5px; font-size: 2rem; line-height: 1; color: var(--cream); }
    #rm-sub    { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; display: none; }
    #rm-rt     { text-align: right; line-height: 1; display: none; }
    #rm-rt-score { font-family: 'Archivo', sans-serif; font-weight: 800; letter-spacing: -0.5px; font-size: 1.6rem; color: var(--cream); }
    #rm-rt-diff  { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px; color: var(--muted); }
    #rm-close-btn { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; touch-action: manipulation; }
    #rm-body   { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding: 20px; padding-bottom: 12px; }
    #rm-footer { flex-shrink: 0; display: none; background: var(--bg); border-top: 1px solid var(--border); padding: 8px 16px calc(8px + env(safe-area-inset-bottom,0px)); }

    /* APPROACH SLIDER */
    .live-dist-card { background: var(--surf2); border: 1px solid rgba(201,168,76,0.2); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; }
    .live-yards { font-family: 'Archivo', sans-serif; font-weight: 800; letter-spacing: -0.5px; font-size: 3rem; color: var(--cream); line-height: 1; }
    .club-suggest { background: var(--surf); border: 1px solid rgba(201,168,76,0.25); border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; display: none; }

    /* SCORE STEPPER */
    .score-cell { font-family: 'Archivo', sans-serif; font-weight: 800; letter-spacing: -0.5px; font-size: 2rem; line-height: 1; color: var(--cream); min-width: 48px; text-align: center; }
    .step-btn { width: 44px; height: 50px; border-radius: 10px; background: var(--surf); border: 1px solid var(--border); font-size: 1.6rem; font-weight: 300; color: var(--cream); cursor: pointer; touch-action: manipulation; display: flex; align-items: center; justify-content: center; }

    /* DRILL */
    .drill { background: var(--surf); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; border: 1px solid var(--border); }
    .drill-t { font-weight: 700; font-size: 0.88rem; color: var(--gold); margin-bottom: 4px; }
    .drill-b { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

    /* ROUND HISTORY */
    .rc { background: var(--surf); border-radius: 12px; padding: 13px 16px; margin-bottom: 10px; border: 1px solid var(--border); }
    .rc-score { font-family: 'Archivo', sans-serif; font-weight: 800; letter-spacing: -0.5px; font-size: 2rem; color: var(--cream); line-height: 1; }

    /* HOLE GRID */
    .hole-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .hg-cell { width: 30px; height: 36px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--surf2); font-size: 0.6rem; gap: 1px; }
    .hg-cell .hn { color: var(--muted); font-size: 0.55rem; }
    .hg-cell .hs { font-weight: 700; font-size: 0.82rem; }
    .hs-eagle  { color: #a78bfa; }
    .hs-birdie { color: #60a5fa; }
    .hs-par    { color: #6ec98a; }
    .hs-bogey  { color: var(--cream); }
    .hs-double { color: #f87171; }
    .hs-worse  { color: #ef4444; }

    /* RESUME BANNER */
    #resume-banner { display: none; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.4); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; cursor: pointer; touch-action: manipulation; }

    /* PHOTO STRIP */
    .photo-strip { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding: 2px 0 6px; scrollbar-width: none; }
    .photo-thumb { position: relative; flex-shrink: 0; }
    .photo-thumb img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(201,168,76,0.3); cursor: pointer; }
    .photo-rm { position: absolute; top: -4px; right: -4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(192,57,43,0.9); border: none; color: #fff; font-size: 0.65rem; cursor: pointer; touch-action: manipulation; display: flex; align-items: center; justify-content: center; }
    .photo-add { flex-shrink: 0; width: 80px; height: 80px; background: var(--surf2); border: 1px dashed rgba(201,168,76,0.3); border-radius: 8px; color: var(--muted); font-size: 0.72rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; touch-action: manipulation; }

    .toast { position: fixed; bottom: calc(72px + env(safe-area-inset-bottom,0px) + 12px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surf2); border: 1px solid var(--border); border-radius: 20px; padding: 8px 18px; font-size: 0.82rem; color: var(--cream); opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 9000; white-space: nowrap; pointer-events: none; }
    .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* AUTH MODAL */
    #auth-modal { position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:9998;padding:24px; }
    #auth-modal.on { display:flex; }
    #auth-modal-inner { background:var(--surf);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;text-align:center; }
    #auth-modal input[type=email] { width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--cream);font-size:1rem;font-family:inherit;margin:16px 0 12px;box-sizing:border-box; }
    #auth-modal input[type=email]::placeholder { color:var(--muted); }
    #auth-modal input[type=email]:focus { outline:none;border-color:rgba(201,168,76,0.5); }
    /* Rendered markdown (Coach's Plan) */
    .md { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }
    .md > *:first-child { margin-top: 0; }
    .md > *:last-child { margin-bottom: 0; }
    .md .md-h { font-family: 'Archivo', sans-serif; font-weight: 700; color: var(--cream); letter-spacing: -0.2px; line-height: 1.3; }
    .md .md-h1 { font-size: 1.0rem; margin: 14px 0 6px; }
    .md .md-h2 { font-size: 0.92rem; margin: 14px 0 5px; }
    .md .md-h3, .md .md-h4 { font-size: 0.85rem; margin: 12px 0 4px; color: var(--gold-l, var(--cream)); }
    .md .md-p { margin: 0 0 9px; }
    .md .md-ul, .md .md-ol { margin: 0 0 9px; padding-left: 1.15rem; }
    .md .md-ul li, .md .md-ol li { margin-bottom: 4px; }
    .md strong { color: var(--cream); font-weight: 700; }
    .md em { font-style: italic; }
  </style>
</head>
<body>

<div id="loading">
  <div class="logo">SPINVIBES</div>
  <div class="sub" id="loading-sub">Loading your app…</div>
  <div class="spinner"></div>
  <div class="err" id="load-err"></div>
</div>

<!-- AUTH MODAL -->
<div id="auth-modal">
  <div id="auth-modal-inner">
    <div style="font-size:1.5rem;margin-bottom:6px;">⛳</div>
    <div style="font-weight:700;font-size:1.05rem;color:var(--cream);" id="auth-modal-title">Save your progress</div>
    <div style="font-size:0.82rem;color:var(--muted);margin-top:6px;line-height:1.5;" id="auth-modal-sub">Enter your email and we'll send a magic link — no password needed. Your rounds and stats will sync across devices.</div>
    <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email">
    <button class="btn-primary" style="width:100%;" id="auth-send-btn" onclick="submitMagicLink()">Send Magic Link</button>
    <div id="auth-msg" style="font-size:0.8rem;margin-top:12px;color:var(--muted);line-height:1.4;"></div>
    <button onclick="closeAuthModal()" style="margin-top:14px;font-size:0.78rem;color:var(--muted);background:none;border:none;cursor:pointer;">Cancel</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div>
      <div class="tb-brand">SPINVIBES</div>
      <div class="tb-user" id="tb-user"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="tb-btn" onclick="openSettings()" title="Settings"><i class="ti ti-settings"></i></button>
      <button class="tb-btn" id="tb-auth-btn" onclick="showAuthModal()" title="Sign in"><i class="ti ti-user-plus"></i></button>
      <button class="tb-btn" onclick="toggleDark()"><i class="ti ti-sun"></i></button>
    </div>
  </div>

  <div id="profile-switcher" class="psw" style="display:none;"></div>

  <div class="pages">
    <div class="page on" id="pg-home"></div>
    <div class="page" id="pg-caddie"></div>
    <div class="page" id="pg-range"></div>
    <div class="page" id="pg-stretch"></div>
    <div class="page" id="pg-shortgame"></div>
    <div class="page" id="pg-strategy"></div>
    <div class="page" id="pg-mygame"></div>
  </div>

  <nav class="nav">

function mapMemberGoal(g){ return ({ learn:'beginner', compete:'break90' })[g] || g || 'fun'; } // keep fun/return as-is

function parseFM(s){

// ── CLUBS (from profile distances or defaults) ───────────────────
// Normalize guide-builder wizard keys (driver,3w,hybrid,7i,9i,pw,sw) → app bag keys
function normalizeDistances(raw) {
  const alias = { '3w':'3wood', 'hybrid':'4hybrid', '7i':'7iron', '9i':'9iron' };
  const d = {};
  Object.entries(raw || {}).forEach(([k,v])=>{ d[alias[k]||k] = v; });
  return d;
}
function getClubs() {
  const d = normalizeDistances(profile?.distances);
  const defaults = { driver:190, '3wood':180, '7wood':170, '4hybrid':165, '5iron':155, '6iron':148, '7iron':138, '8iron':128, '9iron':118, 'pw':105, 'gw':90, 'sw':80, 'lw':65 };
  return Object.assign({}, defaults, d);
}
function suggestClub(yds) {
  const clubs = getClubs();
  let best = null, bestDiff = 999;
  for (const [name, dist] of Object.entries(clubs)) {
    const diff = Math.abs(dist - yds);
    if (diff < bestDiff) { bestDiff = diff; best = { name, dist }; }
  }
  return best;
}

// Read the editor rows back into a clean member array.
function collectMemberRows(){
  return Array.from(document.querySelectorAll('#set-family .fam-row')).map(row=>({
    name: row.querySelector('.fm-name').value.trim(),
    age:  parseInt(row.querySelector('.fm-age').value)||0,
    hand: row.querySelector('.fm-hand').value,
    goal: row.querySelector('.fm-goal').value,
  })).filter(m=>m.name);
}
function addMemberRow(){
  // Preserve any edits already made before appending a blank row.
  const cur = collectMemberRows();
  if (cur.length >= 5) return;
  cur.push({ name:'', age:'', hand:'right', goal:'fun' });
  if (mainProfile) mainProfile.members = cur;
  renderFamilyRows();
  const rows = document.querySelectorAll('#set-family .fam-row');
  rows[rows.length-1]?.querySelector('.fm-name')?.focus();
}
function removeMemberRow(i){
  const cur = collectMemberRows();
  cur.splice(i,1);
  if (mainProfile) mainProfile.members = cur;
  renderFamilyRows();
}
function syncAddMemberBtn(){
  const btn = document.getElementById('set-add-member'); if(!btn) return;
  const n = document.querySelectorAll('#set-family .fam-row').length;
  btn.style.display = n >= 5 ? 'none' : 'block';
}
function closeSettings() { const el=document.getElementById('settings-overlay'); if(el) el.style.display='none'; }

async function saveSettings() {
  const base  = mainProfile || profile;
  const name  = document.getElementById('set-name').value.trim() || base.name;
  const hand  = document.getElementById('set-hand').value;
  const skill = document.getElementById('set-skill').value;
  const goal  = document.getElementById('set-goal').value;
  const miss  = document.getElementById('set-miss').value;
  const distances = normalizeDistances(base.distances);
  SET_CLUBS.forEach(([k])=>{
    const raw = document.getElementById('set-d-'+k).value.trim();
    const v = parseInt(raw);
    if (v && v > 20 && v < 400) distances[k] = v;
    else if (!raw) delete distances[k];
  });
  // Family members from the editor rows
  const members = collectMemberRows();

  // Local first — always works. Top fields edit the MAIN user.
  mainProfile = Object.assign({}, base, { name, hand, skill, goal, distances, members, _key:'main' });
  family = members.map(memberToProfile);
  // Keep the active profile pointer valid (active member may have been renamed/removed).
  if (activeKey === 'main') profile = mainProfile;
  else { const m = family.find(f=>f._key===activeKey); profile = m || (activeKey='main', mainProfile); }

  try { localStorage.setItem('sv-profile-'+userId, JSON.stringify(mainProfile)); } catch(e) {}
  try { miss ? localStorage.setItem(MISS_KEY(), miss) : localStorage.removeItem(MISS_KEY()); } catch(e) {}
  // Then Supabase (guide_users row) — persist members so they survive across devices.
  let synced = false;
  if (userId && !String(userId).startsWith('preview_')) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/guide_users?id=eq.${userId}`, {
        method: 'PATCH',
        headers: { ...SB_HDR, Prefer: 'return=minimal' },
        body: JSON.stringify({ name, hand, skill, goal, distances: Object.keys(distances).length ? distances : null, members: members.length ? members : null }),
      });
      synced = res.ok;
    } catch(e) {}
  }
  closeSettings();
  renderSwitcher();
  renderHome(); renderCaddie(); renderRange(); renderShortGame(); renderStrategy(); renderMyGame();
  document.getElementById('tb-user').textContent = (profile.name||'').toUpperCase();
  showToast(synced ? 'Saved ✓' : 'Saved on this device');
}

// ── KID LEVELING & BADGES (play-based) ───────────────────────────
// Points are DERIVED from a kid's saved rounds (deterministic, no counters to drift).
// Levels/thresholds ported from the PWA; gates simplified to pure points.
const KID_LEVELS = [
  { name:'Fresh Caddie',     color:'#888780', icon:'ti-backpack' },
  { name:'Grip & Ripper',    color:'#639922', icon:'ti-golf' },
  { name:'Ball Finder',      color:'#1D9E75', icon:'ti-zoom-in' },
  { name:'Straight Shooter', color:'#378ADD', icon:'ti-target' },
  { name:'Par Machine',      color:'#7F77DD', icon:'ti-settings' },
  { name:'Course Reader',    color:'#D4537E', icon:'ti-map-2' },
  { name:'Shot Shaper',      color:'#BA7517', icon:'ti-scissors' },
  { name:'Course Boss',      color:'#D85A30', icon:'ti-crown' },
  { name:'Tour Bound',       color:'#c8922a', icon:'ti-trophy' },
];
const KID_LEVEL_THRESH = [4,12,25,42,65,95,130,170]; // cumulative pts to REACH levels 1..8
function kidPointsFromRounds(rds){
  let p=0;
  (rds||[]).filter(r=>!r.practice).forEach(r=>{
    p+=3;                                   // played a round
    if(r.family) p+=1;                      // played with the family
    if(r.game_mode==='junior_scramble') p+=1;
    const hd=r.holeData||[];
    if(hd.some(h=>h.score!=null&&h.par!=null&&h.score<=h.par)) p+=2;  // made par or better
    if(hd.some(h=>h.score!=null&&h.par!=null&&h.score<h.par))  p+=2;  // birdie or better
  });
  return p;
}
function kidLevelInfo(pts){
  let lvl=0; for(let i=0;i<KID_LEVEL_THRESH.length;i++){ if(pts>=KID_LEVEL_THRESH[i]) lvl=i+1; }
  const floor = lvl===0?0:KID_LEVEL_THRESH[lvl-1];
  const nextAt = lvl<8?KID_LEVEL_THRESH[lvl]:null;
  const into = pts-floor, span = nextAt!=null?nextAt-floor:1;
  return { level:lvl, pts, into, span, nextAt, pct: nextAt!=null?Math.min(100,Math.round(into/span*100)):100 };
}
const KID_BADGES = [
  { id:'first_round', name:'First Round',  icon:'ti-flag',         check:(r,p,l)=>r.length>=1 },
  { id:'par_maker',   name:'Par Maker',    icon:'ti-target',       check:(r)=>r.some(x=>(x.holeData||[]).some(h=>h.score!=null&&h.score<=h.par)) },
  { id:'birdie',      name:'Birdie!',      icon:'ti-feather',      check:(r)=>r.some(x=>(x.holeData||[]).some(h=>h.score!=null&&h.score<h.par)) },
  { id:'family',      name:'Family Player',icon:'ti-users',        check:(r)=>r.some(x=>x.family) },
  { id:'scrambler',   name:'Scrambler',    icon:'ti-rocket',       check:(r)=>r.some(x=>x.game_mode==='junior_scramble') },
  { id:'regular',     name:'Regular',      icon:'ti-calendar',     check:(r)=>r.filter(x=>!x.practice).length>=5 },
  { id:'veteran',     name:'Veteran',      icon:'ti-medal',        check:(r)=>r.filter(x=>!x.practice).length>=10 },
  { id:'tour_bound',  name:'Tour Bound',   icon:'ti-trophy',       check:(r,p,l)=>l>=8 },

  return `<div class="card" style="margin-bottom:14px;border:1px solid ${lv.color}55;">

      <div style="position:relative;width:56px;height:56px;flex-shrink:0;">
        <svg viewBox="0 0 56 56" style="width:56px;height:56px;transform:rotate(-90deg);"><circle cx="28" cy="28" r="25" fill="none" stroke="var(--surf2)" stroke-width="5"/><circle cx="28" cy="28" r="25" fill="none" stroke="${lv.color}" stroke-width="5" stroke-linecap="round" stroke-dasharray="${Math.round(info.pct/100*157)} 157"/></svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"><i class="ti ${lv.icon}" style="font-size:1.4rem;color:${lv.color};"></i></div>

      </div>

    <div style="display:flex;gap:8px;overflow-x:auto;margin-top:14px;padding-bottom:2px;">${badgeGrid}</div>
  </div>`;

// Detect a level-up for a kid after a round saves, and celebrate.
function checkKidLevelUp(key, rds){
  const info = kidLevelInfo(kidPointsFromRounds(rds));
  const sk = 'sv-kidlvl-'+(userId||'g')+'-'+key;
  let prev = 0; try{ prev = parseInt(localStorage.getItem(sk))||0; }catch(e){}
  if (info.level>prev){ try{ localStorage.setItem(sk, String(info.level)); }catch(e){}
    const nm = (key==='main'?mainProfile:family.find(f=>f._key===key))?.name || 'They';
    showToast(`🎉 ${nm} reached ${KID_LEVELS[info.level].name}!`);
  } else if (info.level<prev){ try{ localStorage.setItem(sk, String(info.level)); }catch(e){} }
}

function renderBag() {
  const d = profile.distances||{}, bag = profile.bag||'';
  if (!bag && !Object.keys(d).length) return `<div class="card"><div class="card-body" style="color:var(--muted);">No bag info yet — update your guide to add clubs.</div></div>`;
  const rows = Object.entries(d).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.82rem;"><span style="color:var(--muted);">${k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</span><span style="color:var(--cream);font-weight:600;">${v} yds</span></div>`).join('');
  return `<div class="card">${bag?`<div class="card-body" style="margin-bottom:${Object.keys(d).length?'10px':'0'}">${bag}</div>`:''}${rows}</div>`;
}

async function sendCaddie() {
  const inp=document.getElementById('caddie-in'), el=document.getElementById('caddie-msgs'), sys=document.getElementById('caddie-sys').value, msg=inp.value.trim();
  if (!msg) return; inp.value=''; inp.disabled=true;
  el.innerHTML += `<div class="msg u">${esc(msg)}</div>`;
  const t=document.createElement('div'); t.className='msg c'; t.textContent='…'; el.appendChild(t); el.scrollTop=el.scrollHeight;
  caddieHistory.push({role:'user',content:msg}); if (caddieHistory.length>12) caddieHistory=caddieHistory.slice(-12);
  try {
    const r=await fetch(CADDIE_URL,{method:'POST',headers:{'Content-Type':'application/json','X-SpinVibes-Token':WORKER_SECRET},body:JSON.stringify({messages:caddieHistory,systemPrompt:sys})});
    const d=await r.json(); const reply=d.reply||'Sorry, try again.';
    caddieHistory.push({role:'assistant',content:reply}); t.textContent=reply;
  } catch(e) { t.textContent='No signal.'; }
  inp.disabled=false; inp.focus(); el.scrollTop=el.scrollHeight;
}

// ── ROUND TRACKING ───────────────────────────────────────────────
function lockBody()   { const s=window.scrollY; document.body.dataset.scrollY=s; document.body.style.cssText=`overflow:hidden;position:fixed;top:-${s}px;width:100%`; }
function unlockBody() { const s=parseInt(document.body.dataset.scrollY||0); document.body.style.cssText=''; window.scrollTo(0,s); }

function refreshResumeBanner() {
  const b = document.getElementById('resume-banner');
  if (!b) return;
  const d = loadDraft();
  if (d?.holes?.length > 0 && d.holeIdx < d.holes.length) {
    const hp = d.holeIdx+1;
    const tot = d.holes.slice(0,hp).reduce((a,h)=>a+h.score,0);
    document.getElementById('resume-sub').textContent = `${d.round.course||'Round'} · Hole ${hp} of ${d.holes.length} · Score: ${tot}`;
    b.style.display='';
  } else { b.style.display='none'; }
}

function openRound() {
  const draft = loadDraft();
  if (draft?.holes?.length > 0 && draft.holeIdx < draft.holes.length) {
    const hp = draft.holeIdx+1;
    const tot = draft.holes.slice(0,hp).reduce((a,h)=>a+h.score,0);
    if (confirm(`Resume round?\n\n${draft.round.course||'Round'} · Hole ${hp} of ${draft.holes.length}\nScore so far: ${tot}\n\nOK = resume · Cancel = new round`)) {
      _round=draft.round; _holes=draft.holes; _holeIdx=draft.holeIdx;
      _manYards=null; _caddieOpen=false; _caddieHist=[];
      lockBody();
      document.getElementById('round-modal').classList.add('on');
      document.getElementById('rm-rt').style.display='';
      renderHole(); return;
    } else { clearDraft(); }
  }
  // New round — show setup
  _roundMode = 'solo'; _famMode = 'fun';
  lockBody();
  document.getElementById('round-modal').classList.add('on');
  document.getElementById('rm-close-btn').style.display='';
  document.getElementById('rm-label').textContent='Round Setup';
  document.getElementById('rm-sub').style.display='none';
  document.getElementById('rm-rt').style.display='none';
  document.getElementById('rm-footer').style.display='none';
  renderSetup();
}

function closeRound() {
  if (_holes.length>0 && _holeIdx<_holes.length) {
    if (!confirm('Exit round? Your progress is saved — tap Start Round to resume.')) return;
    saveDraft();
  }
  document.getElementById('round-modal').classList.remove('on');
  unlockBody(); clearDraft(); refreshResumeBanner(); renderHome();
}

// ── SCORECARD OCR (scan → pre-fill round) ────────────────────────────
function selectScanTee(btn, color){
  window._scanTee = color;
  document.querySelectorAll('#rs-scan-tees button').forEach(b=>{const on=b===btn;b.style.background=on?'var(--green)':'var(--surf2)';b.style.color=on?'#fff':'var(--muted)';b.style.border=on?'none':'1px solid var(--border)';});
}
function scanPhotoSelected(input){
  const f=input.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=e=>{document.getElementById('rs-preview-img').src=e.target.result;document.getElementById('rs-photo-preview').style.display='block';document.getElementById('rs-parse-btn').style.display='block';document.getElementById('rs-parse-status').textContent='';};
  rd.readAsDataURL(f);
}
function _fileToDataUrl(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});}
function _resizeImg(dataUrl,max){return new Promise(res=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',0.85));};img.onerror=()=>res(dataUrl);img.src=dataUrl;});}
async function parseScorecard(){
  const input=document.getElementById('rs-photo-input'); const f=input?.files?.[0]; if(!f) return;
  const teeColor=window._scanTee||'White';
  const st=document.getElementById('rs-parse-status'), btn=document.getElementById('rs-parse-btn');
  btn.disabled=true; btn.textContent='Reading scorecard…'; st.textContent='';
  try{
    const resized=await _resizeImg(await _fileToDataUrl(f),1400);
    const base64=resized.split(',')[1];
    const r=await fetch(CADDIE_URL+'/parse-scorecard',{method:'POST',headers:{'Content-Type':'application/json','X-SpinVibes-Token':WORKER_SECRET},body:JSON.stringify({image:base64,mediaType:'image/jpeg',teeColor})});
    const d=await r.json();
    if(!r.ok||d.error||!d.course){st.textContent=d.error||'Parse failed — try a clearer, well-lit photo';btn.disabled=false;btn.textContent='Read scorecard with AI →';return;}
    const c=d.course;
    const numH=c.holes||(c.holePars&&c.holePars.length)||18;
    const holePars=(c.holePars&&c.holePars.length)?c.holePars.map(p=>p||4):Array(numH).fill(4);
    const yardages=(c.yardages&&c.yardages.length)?c.yardages:Array(numH).fill(null);
    const par=c.par||holePars.reduce((a,b)=>a+(b||0),0);
    const name=c.name||'Scanned course';
    const loc=[c.city,c.state].filter(Boolean).join(', ');
    window._setupCourse={id:null,name,loc,course:null,data:{allTees:[{name:teeColor,rating:c.rating||null,slope:c.slope||null,par,holePars,yardages,yards:yardages.reduce((a,b)=>a+(b||0),0)||null}]}};
    window._setupTee=teeColor;
    setHoles(numH===9?9:18,false);
    renderScanReview(name, loc, numH, teeColor);
    st.innerHTML='';
    btn.style.display='none'; document.getElementById('rs-photo-preview').style.display='none';
  }catch(e){st.textContent='Network error — check your signal';console.error(e);}
  finally{btn.disabled=false;btn.textContent='Read scorecard with AI →';}
}
// Editable review of a scanned scorecard — correct misreads before Start Round
function renderScanReview(name, loc, numH, teeColor){
  const tee = window._setupCourse?.data?.allTees?.[0]; if(!tee) return;
  const el = document.getElementById('rs-scan-review'); if(!el) return;
  const inStyle = "background:var(--surf2);border:1px solid var(--border);border-radius:8px;color:var(--cream);font-family:inherit;text-align:center;padding:6px 4px;font-size:0.82rem;";
  const rows = tee.holePars.map((p,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid var(--border);">
      <span style="flex:1;font-size:0.8rem;color:var(--muted);">Hole ${i+1}</span>
      <input type="number" inputmode="numeric" min="3" max="6" value="${p||''}" onchange="scanEditHole(${i},'par',this.value)" style="${inStyle}width:52px;">
      <input type="number" inputmode="numeric" value="${tee.yardages[i]||''}" placeholder="—" onchange="scanEditHole(${i},'yds',this.value)" style="${inStyle}width:68px;">
    </div>`).join('');
  el.innerHTML = `
    <div style="background:rgba(36,150,87,0.06);border:1px solid rgba(36,150,87,0.3);border-radius:12px;padding:12px 14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:0.66rem;font-weight:700;letter-spacing:0.5px;color:var(--green);text-transform:uppercase;">Scanned ✓ — check &amp; edit</div>
        <button type="button" onclick="clearScanReview()" style="background:none;border:none;color:var(--muted);font-size:1.05rem;line-height:1;cursor:pointer;touch-action:manipulation;">✕</button>
      </div>
      <label class="ml">Course${loc?` · ${loc}`:''}</label>
      <input type="text" id="scan-name" class="mi" value="${name.replace(/"/g,'&quot;')}" oninput="if(window._setupCourse)window._setupCourse.name=this.value;">
      <div style="display:flex;gap:8px;align-items:center;margin:6px 2px 2px;font-size:0.6rem;color:var(--muted);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;">
        <span style="flex:1;">${teeColor} tee · ${numH} holes</span><span style="width:52px;text-align:center;">Par</span><span style="width:68px;text-align:center;">Yards</span>
      </div>
      <div style="max-height:230px;overflow-y:auto;-webkit-overflow-scrolling:touch;">${rows}</div>
      <div style="text-align:right;font-size:0.82rem;color:var(--cream);font-weight:700;margin-top:8px;">Total par: <span id="scan-par">${tee.par}</span></div>
    </div>`;
  el.style.display='';
}
function scanEditHole(i, field, val){
  const tee = window._setupCourse?.data?.allTees?.[0]; if(!tee) return;
  const n = parseInt(val,10);
  if(field==='par'){ tee.holePars[i] = isNaN(n)?tee.holePars[i]:n; tee.par = tee.holePars.reduce((a,b)=>a+(b||0),0); const pe=document.getElementById('scan-par'); if(pe) pe.textContent=tee.par; }
  else { tee.yardages[i] = isNaN(n)?null:n; tee.yards = tee.yardages.reduce((a,b)=>a+(b||0),0)||null; }
}
function clearScanReview(){

function setHoles(n, par3) {

async function searchCourse() {
  const q=(document.getElementById('rs-search')?.value||'').trim();
  const st=document.getElementById('rs-status'), re=document.getElementById('rs-results');
  if (!q||q.length<2){if(st)st.textContent='Type at least 2 characters';return;}
  if(st)st.textContent='Searching…'; if(re)re.innerHTML='';
  try {
    const r=await fetch(CADDIE_URL+'/course-search',{method:'POST',headers:{'Content-Type':'application/json','X-SpinVibes-Token':WORKER_SECRET},body:JSON.stringify({query:q})});
    const d=await r.json();
    if(!r.ok||d.error){if(st)st.textContent=d.error||'Search failed';return;}
    const courses=d.courses||[];
    if(!courses.length){if(st)st.textContent='No courses found';return;}
    if(st)st.textContent=courses.length+' found — tap to select';

      const loc=[c.city,c.state].filter(Boolean).join(', ');

        ${loc?`<div style="font-size:0.7rem;color:var(--muted);">${loc}</div>`:''}
      </div>`;
    }).join('');
  } catch(e){if(st)st.textContent='Network error';}
}

function startRound(quick) {

  const holePars = par3 ? Array(numH).fill(3) : (tee?.holePars||Array(numH).fill(4));
  const yardages = par3 ? Array(numH).fill(null) : (tee?.yardages||Array(numH).fill(null));

  _round = { date, course: courseName, par: (par3 ? numH*3 : (tee?.par||holePars.reduce((a,b)=>a+b,0))), tee: tee?.name||null, round_type: par3?'par3':(numH===9?'nine':'regulation_18'), rating: tee?.rating||null, slope: tee?.slope||null };

// ── HOLE TRACKING ────────────────────────────────────────────────

function adjScore(d) {
  const h=_holes[_holeIdx]; h.score=Math.max(1,h.score+d);

  const played=_holes.slice(0,_holeIdx), run=played.reduce((a,x)=>a+x.score,0)+h.score;
  const vs=played.reduce((a,x)=>a+x.score-x.par,0)+(h.score-h.par);
  document.getElementById('rm-rt-score').textContent=run;
  const rtd=document.getElementById('rm-rt-diff'); rtd.textContent=vs===0?'E':vs>0?'+'+vs:String(vs); rtd.style.color=vs<0?'#60a5fa':vs===0?'var(--muted)':'#f87171';
}
function adjPar(d) { const h=_holes[_holeIdx]; h.par=Math.max(3,Math.min(5,h.par+d)); const el=document.getElementById('h-par'); if(el) el.textContent=h.par; }

async function resizeImg(dataUrl, maxPx) {
  return new Promise(res=>{
    const img=new Image(); img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',0.82));
    }; img.src=dataUrl;
  });
}

async function _uploadAppHolePhotos(roundId) {
  for (const h of _holes) {
    if (!h.photos?.length) continue;
    const uploaded = [];
    for (let i = 0; i < h.photos.length; i++) {
      const p = h.photos[i];
      if (!p || p.startsWith('http')) { uploaded.push(p); continue; }
      try {
        const res  = await fetch(p);
        const blob = await res.blob();
        const path = `app/${roundId}/hole-${h.hole}-${i}.jpg`;
        const { error } = await _sb.storage.from('round-photos').upload(path, blob, { contentType: 'image/jpeg', upsert: true });
        if (!error) {
          const { data } = _sb.storage.from('round-photos').getPublicUrl(path);
          uploaded.push(data.publicUrl);
        } else { uploaded.push(p); }
      } catch(e) { uploaded.push(p); }
    }
    h.photos = uploaded;
  }
}

async function saveCompletedRound() {
  const roundId = Date.now().toString();
  const saveBtn = document.querySelector('#round-modal .btn-gold');

  // Upload hole photos before saving
  const hasPhotos = _holes.some(h => h.photos?.some(p => p && !p.startsWith('http')));
  if (hasPhotos) {
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Uploading photos…'; }
    await _uploadAppHolePhotos(roundId);
  }
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }

  const total = _holes.reduce((a,h)=>a+h.score,0);
  const par   = _holes.reduce((a,h)=>a+h.par,0);
  const r = {
    id: roundId,
    date: _round.date || new Date().toISOString().split('T')[0],
    course: _round.course||'', total, par, holes: _holes.length, tee: _round.tee||null,
    round_type: _round.round_type||(_holes.length===9?'nine':'regulation_18'), rating: _round.rating||null, slope: _round.slope||null,
    holeData: _holes.map(h=>({hole:h.hole, par:h.par, score:h.score, yds:h.yds, approachYds:h.approachYds, approachClub:h.approachClub||null, missDir:h.missDir||null, missDepth:h.missDepth||null, photo:h.photos?.[0]||null})),
    notes: document.getElementById('rs-notes')?.value.trim()||'',
  };
  await persistRound(r);
  if (!_authUser) rounds = [...rounds.filter(x=>x.id!==r.id), r];
  if (profile.isKid) checkKidLevelUp(activeKey, rounds);
  showToast('Round saved ✓');
  document.getElementById('round-modal').classList.remove('on');
  unlockBody(); refreshResumeBanner(); renderMyGame(); renderHome();
}

function startFamilyRound(quick){

function famBomb(k){

async function saveFamilyRound(btn){

    const rec={ id:base+'-'+pl.key, date:_famRound.date||new Date().toISOString().split('T')[0], course:_famRound.course||'',

    // Save locally under each player's per-profile round key

    try{ const k=RK(); arr=JSON.parse(localStorage.getItem(k)||'[]'); arr.push(rec); localStorage.setItem(k,JSON.stringify(arr)); }catch(e){}
    // Kid leveling — celebrate any level-up from this round

  const club = `<div class="card">

      <div><span style="color:var(--gold);font-weight:700;">9-iron</span><span style="color:var(--muted);"> — Bump &amp; run. Low, lots of roll. Use most of the time.</span></div>

    <div style="font-size:0.73rem;color:var(--muted);margin-bottom:14px;">Chipping · Putting · Around the Green</div>

// ── HANDICAP INDEX (WHS estimate) ────────────────────────────────────
function _scoreDiff(score, rating, slope){ return Math.round(((score - rating) * 113 / slope) * 10) / 10; }
function _whsBestCount(n){ if(n<=5)return 1; if(n<=7)return 2; if(n<=9)return 3; if(n<=11)return 4; if(n<=13)return 5; if(n<=16)return 6; if(n<=18)return 7; return 8; }
function calcHandicapIndex(allRounds){
  const eligible = allRounds
    .filter(r=>!r.practice && (r.round_type||'regulation_18')==='regulation_18' && r.rating && r.slope && r.total)
    .map(r=>({date:r.date||'', score:r.total, rating:r.rating, slope:r.slope, diff:_scoreDiff(r.total,r.rating,r.slope), course:r.course}))
    .sort((a,b)=>a.date.localeCompare(b.date));
  if(!eligible.length) return null;
  const last20 = eligible.slice(-20);
  const count = _whsBestCount(last20.length);
  const best = [...last20].sort((a,b)=>a.diff-b.diff).slice(0,count);
  const avg = best.reduce((s,d)=>s+d.diff,0)/best.length;
  const index = Math.round(avg*0.96*10)/10;
  return { index, differentials:last20, eligibleCount:eligible.length, usedCount:count };
}
function handicapCardHtml(allRounds){
  const hc = calcHandicapIndex(allRounds);
  if(!hc){
    const hasReg = allRounds.some(r=>!r.practice && (r.round_type||'regulation_18')==='regulation_18');
    if(!hasReg) return '';
    return `<div class="card" style="margin-bottom:14px;"><div class="card-title">Handicap index</div><div class="card-body">Play a regulation 18 at a rated course (search and pick a course + tee) to start building your WHS index.</div></div>`;
  }
  const recent = hc.differentials.slice(-8);
  const diffs = recent.map(d=>d.diff);
  const dMin=Math.min(...diffs), dMax=Math.max(...diffs), dRange=(dMax-dMin)||1;
  const bars = recent.map((d,i)=>{
    const pct = 100 - Math.round(((d.diff-dMin)/dRange)*70);
    const isLast = i===recent.length-1;
    const col = isLast ? 'var(--green)' : (d.diff < hc.index ? 'rgba(110,201,138,0.6)' : 'var(--surf3,#cdd6cf)');
    return `<div title="${d.diff}" style="flex:1;height:${Math.max(15,pct)}%;background:${col};border-radius:3px 3px 0 0;"></div>`;
  }).join('');
  return `<div class="card" style="margin-bottom:14px;">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px;">
      <div>
        <div style="font-size:0.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Handicap index</div>
        <div style="display:flex;align-items:baseline;gap:6px;">
          <div style="font-family:'Archivo',sans-serif;font-weight:800;font-size:2.6rem;color:var(--cream);line-height:1;">${hc.index.toFixed(1)}</div>
          <div style="font-size:0.7rem;color:var(--muted);">est. WHS</div>
        </div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:0.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Rounds used</div>
        <div style="font-family:'Archivo',sans-serif;font-weight:800;font-size:1.4rem;color:var(--cream);line-height:1;">${hc.usedCount}<span style="font-size:0.8rem;color:var(--muted);"> of </span>${hc.eligibleCount}</div>
        <div style="font-size:0.58rem;color:var(--muted);">best differentials</div>
      </div>
    </div>
    <div style="display:flex;align-items:flex-end;gap:3px;height:30px;">${bars}</div>
    <div style="display:flex;justify-content:space-between;margin-top:4px;">
      <div style="font-size:0.55rem;color:var(--muted);">${(recent[0]?.date||'').slice(5)}</div>
      <div style="font-size:0.55rem;color:var(--green);font-weight:600;">recent → lower is better</div>
    </div>
  </div>`;
}

function renderMyGame() {

// Aggregate miss pattern across all saved rounds — mirrors the PWA's dispersion stats
function _dispersionStatsHtml(rs) {
  const dirs={left:0,on:0,right:0}, depths={short:0,pin:0,long:0};
  rs.forEach(r=>(r.holeData||[]).forEach(h=>{
    if(h.missDir && dirs[h.missDir]!==undefined) dirs[h.missDir]++;
    if(h.missDepth && depths[h.missDepth]!==undefined) depths[h.missDepth]++;
  }));
  const dTot=dirs.left+dirs.on+dirs.right, pTot=depths.short+depths.pin+depths.long;
  if (dTot<3 && pTot<3) return '';
  const bar=(counts,tot,labels)=>Object.entries(counts).map(([k,v],i)=>{
    const pct=tot?Math.round(v/tot*100):0;
    return `<div style="flex:1;text-align:center;">
      <div style="height:44px;display:flex;align-items:flex-end;justify-content:center;"><div style="width:60%;height:${Math.max(4,pct*0.44)}px;background:${pct>=50?'var(--green)':'var(--surf3)'};border-radius:4px 4px 0 0;"></div></div>
      <div style="font-size:0.72rem;font-weight:700;color:var(--cream);margin-top:3px;">${pct}%</div>
      <div style="font-size:0.6rem;color:var(--muted);">${labels[i]}</div>
    </div>`;}).join('');
  let callout='';
  if (dTot>=3) {
    const worst=Object.entries(dirs).filter(([k])=>k!=='on').sort((a,b)=>b[1]-a[1])[0];
    if (worst && worst[1]/dTot>=0.5) callout=`<div style="font-size:0.76rem;color:var(--green);font-weight:600;margin-top:8px;">Pattern: you miss ${worst[0]} ${Math.round(worst[1]/dTot*100)}% of the time — aim adjust or tell your caddie.</div>`;
  }
  return `<div class="card" style="margin-bottom:14px;">
    <div class="card-title">Shot dispersion</div>
    ${dTot>=3?`<div style="font-size:0.62rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:8px 0 2px;">Direction (${dTot} shots)</div><div style="display:flex;gap:6px;">${bar(dirs,dTot,['← Left','On line','Right →'])}</div>`:''}
    ${pTot>=3?`<div style="font-size:0.62rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:10px 0 2px;">Depth (${pTot} shots)</div><div style="display:flex;gap:6px;">${bar(depths,pTot,['Short','Pin high','Long'])}</div>`:''}
    ${callout}
  </div>`;
}
function roundCard(r) {
  const vs=r.total-(r.par||72), vsStr=vs===0?'E':vs>0?'+'+vs:String(vs);
  const vsC=vs<0?'#60a5fa':vs===0?'#6ec98a':'var(--cream)';
  const hg=r.holeData?.map(h=>{const d=h.score-h.par;const cls=d<=-2?'hs-eagle':d===-1?'hs-birdie':d===0?'hs-par':d===1?'hs-bogey':d===2?'hs-double':'hs-worse';return `<div class="hg-cell"><span class="hn">H${h.hole}</span><span class="hs ${cls}">${h.score}</span></div>`;}).join('')||'';
  return `<div class="rc">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:${hg?'10px':'0'};">
      <div><div style="font-weight:700;font-size:0.9rem;color:var(--cream);">${r.course||'Golf Round'}</div><div style="font-size:0.73rem;color:var(--muted);margin-top:2px;">${r.date||''} · ${r.holes||18} holes${r.tee?' · '+r.tee+' tee':''}</div></div>
      <div style="text-align:right;"><div class="rc-score">${r.total}</div><div style="font-size:0.72rem;font-weight:700;color:${vsC};">${vsStr}</div></div>
    </div>
    ${hg?`<div class="hole-grid">${hg}</div>`:''}
    ${r.notes?`<div style="font-size:0.8rem;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;margin-top:4px;">${esc(r.notes)}</div>`:''}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;gap:8px;">
      <button onclick="delRound('${r.id}')" style="background:none;border:none;color:rgba(192,57,43,0.5);font-size:0.72rem;cursor:pointer;touch-action:manipulation;">Delete</button>
      <div style="display:flex;gap:8px;align-items:center;">
        ${_hcEligible(r)?`<button onclick="openHandicapFix('${r.id}')" style="background:none;border:1px solid rgba(36,150,87,0.4);border-radius:8px;padding:4px 10px;color:var(--green);font-size:0.72rem;font-weight:600;cursor:pointer;touch-action:manipulation;">+ Handicap data</button>`:''}
        <button id="share-btn-${r.id}" onclick="showSharePicker(${JSON.stringify(r).replace(/"/g,'&quot;')},)" style="background:none;border:1px solid rgba(201,168,76,0.3);border-radius:8px;padding:4px 10px;color:var(--gold-l);font-size:0.72rem;font-weight:600;cursor:pointer;touch-action:manipulation;">&#x1F4E4; Share</button>
      </div>
    </div>
  </div>`;
}
// A round can feed the handicap index if it's a regulation 18 with no rating/slope yet
function _hcEligible(r){ return !r.practice && (r.holes||18)===18 && (r.round_type==='regulation_18' || !r.round_type) && (!r.rating || !r.slope); }
function openHandicapFix(id){
  const r = rounds.find(x=>x.id===id); if(!r) return;
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;';

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <div style="font-family:'Archivo',sans-serif;font-weight:800;font-size:1.1rem;color:var(--cream);">Handicap data</div>
      <button onclick="this.closest('[style*=fixed]').remove();" style="background:none;border:none;color:var(--muted);font-size:1.3rem;line-height:1;cursor:pointer;touch-action:manipulation;">✕</button>

    <div style="display:flex;gap:10px;">
      <div style="flex:1;"><label class="ml">Course rating</label><input type="number" inputmode="decimal" id="hc-rating" class="mi" placeholder="e.g. 70.1" value="${r.rating||''}"></div>
      <div style="flex:1;"><label class="ml">Slope</label><input type="number" inputmode="numeric" id="hc-slope" class="mi" placeholder="e.g. 123" value="${r.slope||''}"></div>
    </div>
    <button class="btn-gold" style="width:100%;margin-top:6px;" onclick="saveHandicapFix('${id}',this)">Save</button>`;
  overlay.appendChild(sheet); document.body.appendChild(overlay);
}
async function saveHandicapFix(id, btn){
  const rating=parseFloat(document.getElementById('hc-rating').value);
  const slope=parseInt(document.getElementById('hc-slope').value,10);
  if(isNaN(rating)||isNaN(slope)||rating<50||rating>90||slope<55||slope>155){ showToast('Enter a valid rating (50–90) and slope (55–155)','error'); return; }
  const r=rounds.find(x=>x.id===id); if(!r) return;
  r.rating=Math.round(rating*10)/10; r.slope=slope; if(!r.round_type) r.round_type='regulation_18';
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{ await persistRound(r); }catch(e){}
  persistRounds();
  document.querySelector('#hc-rating')?.closest('[style*=fixed]')?.remove();
  renderMyGame(); showToast('Added to your handicap ✓');
}
function delRound(id) { if(!confirm('Delete this round?')) return; rounds=rounds.filter(r=>r.id!==id); persistRounds(); renderMyGame(); renderHome(); showToast('Deleted'); }

// ── DRAFT / STORAGE ──────────────────────────────────────────────
// Each profile gets its own round history. Main user keeps the legacy key;
// members are suffixed by their _key so switching profiles swaps the data.
const RK = ()=>'sv-app-rounds-'+(userId||'g')+(activeKey==='main'?'':'-'+activeKey);

async function loadRounds() {
  // Only the main (authed) profile syncs with Supabase; members are local-only.
  if (_authUser && activeKey==='main') {
    try {
      const { data } = await _sb.from('user_rounds').select('*').order('date_played', { ascending: false }).limit(50);
      return data || [];
    } catch(e) {}
  }
  try { return JSON.parse(localStorage.getItem(RK()) || '[]'); } catch(e) { return []; }
}

async function persistRound(r) {
  if (_authUser && activeKey==='main') {
    try {
      await _sb.from('user_rounds').upsert({
        ...r, id: r.id || undefined,
        user_id: _authUser.id, guide_user_id: userId || null,
        date_played: r.date || new Date().toISOString().split('T')[0],
      });
      return;
    } catch(e) { console.warn('Supabase round save failed, falling back to localStorage', e); }
  }
  if (!rounds.find(x => x.id === r.id)) rounds.push(r);
  try { localStorage.setItem(RK(), JSON.stringify(rounds)); } catch(e) {}
}

function persistRounds() { try { localStorage.setItem(RK(), JSON.stringify(rounds)); } catch(e) {} }

// ── AUTH FUNCTIONS ───────────────────────────────────────────────
async function linkAuthToProfile(authId) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/guide_users?id=eq.${userId}`, {
      method: 'PATCH',
      headers: { ...SB_HDR, Authorization: `Bearer ${(await _sb.auth.getSession()).data.session?.access_token || SUPABASE_ANON}`, Prefer: 'return=minimal' },
      body: JSON.stringify({ auth_id: authId })
    });
    if (profile) { profile.auth_id = authId; localStorage.setItem('sv-profile-'+userId, JSON.stringify(profile)); }
  } catch(e) { console.warn('linkAuthToProfile failed', e); }
}

async function migrateLocalRoundsToSupabase() {
  const local = (() => { try { return JSON.parse(localStorage.getItem(RK()) || '[]'); } catch(e) { return []; } })();
  if (!local.length || !_authUser) return;
  for (const r of local) { await persistRound(r); }
  localStorage.removeItem(RK()); // clear local now that they're in Supabase
  rounds = await loadRounds();
  renderMyGame(); renderHome();
}

let _svLogo = null;
async function _loadLogo() {
  if (_svLogo) return _svLogo;
  try { _svLogo = await _loadImg('/spinvibes_logo.png'); } catch(e) {}
  return _svLogo;
}
function _loadImg(src) {
  return new Promise((res,rej)=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>res(i);i.onerror=()=>res(null);i.src=src;});
}
function _mkCanvas(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return c;}
function _toBlob(c){return new Promise(r=>c.toBlob(r,'image/png'));}
function _imgCover(ctx,img,x,y,w,h){const ar=img.width/img.height;let dw=w,dh=h,dx=x,dy=y;if(ar>w/h){dh=h;dw=h*ar;dx=x-(dw-w)/2;}else{dw=w;dh=w/ar;dy=y-(dh-h)/2;}ctx.drawImage(img,dx,dy,dw,dh);}

async function _cardChrome(ctx,W,H,sf) {
  // Top vignette
  const g=ctx.createLinearGradient(0,0,0,H*0.22);g.addColorStop(0,'rgba(0,0,0,0.45)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Logo
  const logo=await _loadLogo();
  if (logo){const lw=Math.round(200*sf),lh=Math.round(lw*(logo.height/logo.width)),pad=Math.round(22*sf);ctx.drawImage(logo,W-lw-pad,pad,lw,lh);}
  // Gold frame
  ctx.strokeStyle='#c9a84c';ctx.lineWidth=Math.round(4*sf);const fi=Math.round(10*sf);ctx.strokeRect(fi,fi,W-fi*2,H-fi*2);
}
function _botGrad(ctx,H){const g=ctx.createLinearGradient(0,H*0.60,0,H);g.addColorStop(0,'rgba(10,14,8,0)');g.addColorStop(0.45,'rgba(10,14,8,0.72)');g.addColorStop(1,'rgba(10,14,8,0.97)');return g;}
function _rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

async function _drawCollage(ctx,W,H,photos){
  const MAX=9,count=Math.min(photos.length,MAX);
  const disp=photos.length>MAX?Array.from({length:MAX},(_,i)=>photos[Math.floor(i*photos.length/MAX)]):photos.slice(0,count);
  const cols=count===1?1:count<=4?2:3,rows=Math.ceil(count/cols),cw=W/cols,ch=H/rows;
  const imgs=await Promise.all(disp.map(p=>_loadImg(p)));
  imgs.forEach((img,i)=>{
    if(!img)return;const col=i%cols,row=Math.floor(i/cols);
    const rowStart=row*cols,inRow=Math.min(cols,count-rowStart),ox=inRow<cols?(W-inRow*cw)/2:0;
    ctx.save();ctx.beginPath();ctx.rect(ox+col*cw,row*ch,cw,ch);ctx.clip();_imgCover(ctx,img,ox+col*cw,row*ch,cw,ch);ctx.restore();
  });
}

// Template 1: Full scorecard card
async function buildScorecardCard(roundData) {
  const W=720,H=1280,sf=0.76;
  const canvas=_mkCanvas(W,H); const ctx=canvas.getContext('2d');
  const holes=roundData.holeData||[];
  const photos=holes.flatMap(h=>h.photo?[h.photo]:[]).filter(p=>p&&(p.startsWith('http')||p.startsWith('data:')));
  ctx.fillStyle='#0d1a0a';ctx.fillRect(0,0,W,H);
  const photoH=Math.round(H*0.36);
  if(photos.length){ctx.save();ctx.beginPath();ctx.rect(0,0,W,photoH);ctx.clip();await _drawCollage(ctx,W,photoH,photos);ctx.restore();}
  const fade=ctx.createLinearGradient(0,photoH*0.45,0,photoH+40);fade.addColorStop(0,'rgba(13,26,10,0)');fade.addColorStop(1,'rgba(13,26,10,1)');ctx.fillStyle=fade;ctx.fillRect(0,0,W,photoH+40);

  // Course + date
  let y=photoH;
  ctx.textAlign='center';
  ctx.fillStyle='#f5f0e8';ctx.font=`800 ${Math.round(40*sf)}px Archivo,Arial`;ctx.fillText((roundData.course||'').toUpperCase(),W/2,y);y+=Math.round(26*sf);
  ctx.fillStyle='rgba(255,255,255,0.38)';ctx.font=`400 ${Math.round(16*sf)}px Archivo,Arial`;ctx.fillText(`${roundData.date||''} · Par ${roundData.par||72}`,W/2,y);y+=Math.round(18*sf);
  ctx.strokeStyle='rgba(201,168,76,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(36,y);ctx.lineTo(W-36,y);ctx.stroke();y+=10;

  // Score grid (front 9 + back 9)
  const front=holes.slice(0,9),back=holes.slice(9,18);
  function drawGrid(hs,startY,label){
    const pad=24,nameW=44,subW=34,holeW=(W-pad*2-nameW-subW)/hs.length,rowH=Math.round(24*sf);
    ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(pad,startY,W-pad*2,rowH);
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font=`400 ${Math.round(11*sf)}px Archivo,Arial`;ctx.textAlign='center';
    hs.forEach((h,i)=>ctx.fillText(String(h.hole),pad+nameW+i*holeW+holeW/2,startY+rowH*0.72));
    ctx.fillText(label,pad+nameW+hs.length*holeW+subW/2,startY+rowH*0.72);
    const parY=startY+rowH;
    ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fillRect(pad,parY,W-pad*2,rowH);
    ctx.fillStyle='rgba(255,255,255,0.28)';ctx.font=`400 ${Math.round(11*sf)}px Archivo,Arial`;ctx.textAlign='left';ctx.fillText('PAR',pad+4,parY+rowH*0.72);
    hs.forEach((h,i)=>{ctx.textAlign='center';ctx.fillText(String(h.par),pad+nameW+i*holeW+holeW/2,parY+rowH*0.72);});
    const parSub=hs.reduce((a,h)=>a+h.par,0);ctx.fillText(String(parSub),pad+nameW+hs.length*holeW+subW/2,parY+rowH*0.72);
    const rowY=parY+rowH;
    ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fillRect(pad,rowY,W-pad*2,rowH);
    ctx.fillStyle='#c9a84c';ctx.font=`500 ${Math.round(11.5*sf)}px Archivo,Arial`;ctx.textAlign='left';ctx.fillText(profile.name.slice(0,6),pad+4,rowY+rowH*0.72);
    hs.forEach((h,i)=>{
      const d=h.score-h.par,col=d<=-1?'#60a5fa':d===0?'rgba(255,255,255,0.7)':'#f87171';
      ctx.fillStyle=col;ctx.font=`500 ${Math.round(12*sf)}px Archivo,Arial`;ctx.textAlign='center';ctx.fillText(String(h.score),pad+nameW+i*holeW+holeW/2,rowY+rowH*0.72);
    });
    const sub=hs.reduce((a,h)=>a+h.score,0);const subD=sub-hs.reduce((a,h)=>a+h.par,0);
    ctx.fillStyle=subD<0?'#60a5fa':subD===0?'rgba(255,255,255,0.6)':'#f87171';ctx.font=`500 ${Math.round(12.5*sf)}px Archivo,Arial`;ctx.textAlign='center';ctx.fillText(String(sub),pad+nameW+hs.length*holeW+subW/2,rowY+rowH*0.72);
    return rowY+rowH;
  }

  y=drawGrid(front,y,'OUT')+Math.round(6*sf);
  if(back.length) y=drawGrid(back,y,'IN')+Math.round(12*sf);

  ctx.strokeStyle='rgba(201,168,76,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(36,y);ctx.lineTo(W-36,y);ctx.stroke();y+=Math.round(14*sf);

  // Total score
  const total=roundData.total,par=roundData.par||72,diff=total-par;
  const diffStr=diff===0?'E':diff>0?'+'+diff:String(diff);
  const diffC=diff<0?'#60a5fa':diff===0?'#6ec98a':'#f87171';
  ctx.textAlign='center';
  ctx.fillStyle='rgba(10,14,8,0.55)';_rr(ctx,(W-200)/2,y,200,Math.round(80*sf),12);ctx.fill();
  ctx.fillStyle='#f5f0e8';ctx.font=`800 ${Math.round(58*sf)}px Archivo,Arial`;ctx.fillText(String(total),W/2,y+Math.round(56*sf));
  ctx.fillStyle=diffC;ctx.font=`500 ${Math.round(18*sf)}px Archivo,Arial`;ctx.fillText(diffStr,W/2,y+Math.round(74*sf));

  await _cardChrome(ctx,W,H,sf);
  return _toBlob(canvas);
}

// Template 2: Hole highlight
async function buildHoleCard(holeData,roundData){
  const W=720,H=1280,sf=0.76;const canvas=_mkCanvas(W,H);const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0d1a0a';ctx.fillRect(0,0,W,H);
  if(holeData.photo){const img=await _loadImg(holeData.photo);if(img)_imgCover(ctx,img,0,0,W,H);}
  ctx.fillStyle=_botGrad(ctx,H);ctx.fillRect(0,0,W,H);
  const SAFE=Math.round(18*sf);
  ctx.fillStyle='rgba(10,14,8,0.58)';_rr(ctx,SAFE,SAFE,Math.round(180*sf),Math.round(34*sf),8);ctx.fill();
  ctx.fillStyle='#c9a84c';ctx.font=`500 ${Math.round(14*sf)}px Archivo,Arial`;ctx.textAlign='left';ctx.fillText(`Hole ${holeData.hole}  ·  Par ${holeData.par}`,SAFE+12,SAFE+Math.round(24*sf));
  // Score chip
  const sc=holeData.score,diff=sc-holeData.par,diffStr=diff===0?'E':diff>0?'+'+diff:String(diff);
  const scCol=diff<=-2?'#a78bfa':diff===-1?'#fbbf24':diff===0?'#6ec98a':'#f87171';
  const chipW=Math.round(180*sf),chipH=Math.round(140*sf),chipX=(W-chipW)/2,chipY=H-Math.round(32*sf)-Math.round(50*sf)-chipH;
  ctx.fillStyle='rgba(10,14,8,0.65)';_rr(ctx,chipX,chipY,chipW,chipH,14);ctx.fill();
  ctx.fillStyle=scCol;ctx.strokeStyle=scCol;ctx.lineWidth=2;_rr(ctx,chipX,chipY,chipW,chipH,14);ctx.stroke();
  ctx.textAlign='center';const mx=chipX+chipW/2;
  ctx.fillStyle='rgba(255,255,255,0.65)';ctx.font=`500 ${Math.round(15*sf)}px Archivo,Arial`;ctx.fillText(profile.name,mx,chipY+chipH*0.28);
  ctx.fillStyle=scCol;ctx.font=`800 ${Math.round(60*sf)}px Archivo,Arial`;ctx.fillText(String(sc),mx,chipY+chipH*0.73);
  const achv=diff<=-2?'EAGLE':diff===-1?'BIRDIE':diff===0?'PAR':null;
  ctx.fillStyle=achv?'#fbbf24':'rgba(255,255,255,0.4)';ctx.font=`400 ${Math.round(13*sf)}px Archivo,Arial`;ctx.fillText(achv||diffStr,mx,chipY+chipH*0.92);
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font=`400 ${Math.round(13*sf)}px Archivo,Arial`;ctx.fillText(`${(roundData.course||'').toUpperCase()}  ·  ${roundData.date||''}`,W/2,H-Math.round(20*sf));
  await _cardChrome(ctx,W,H,sf);return _toBlob(canvas);
}

// Template 3: Best Moment — auto-picks the round's standout hole (best vs par, photo breaks ties)
async function buildBestMomentCard(roundData){
  const holes=roundData.holeData||[];
  if(!holes.length) return null;
  const hp=p=>!!p&&(p.startsWith('http')||p.startsWith('data:'));
  let best=null,bestVal=Infinity;
  holes.forEach(h=>{ const v=(h.score-h.par)+(hp(h.photo)?-0.5:0); if(v<bestVal){bestVal=v;best=h;} });
  if(!best) return null;
  const W=720,H=1280,sf=0.76;const canvas=_mkCanvas(W,H);const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0d1a0a';ctx.fillRect(0,0,W,H);
  if(hp(best.photo)){const img=await _loadImg(best.photo);if(img)_imgCover(ctx,img,0,0,W,H);}
  ctx.fillStyle=_botGrad(ctx,H);ctx.fillRect(0,0,W,H);
  const SAFE=Math.round(18*sf);
  ctx.fillStyle='rgba(10,14,8,0.58)';_rr(ctx,SAFE,SAFE,Math.round(206*sf),Math.round(34*sf),8);ctx.fill();
  ctx.fillStyle='#c9a84c';ctx.font=`500 ${Math.round(14*sf)}px Archivo,Arial`;ctx.textAlign='left';ctx.fillText('BEST MOMENT',SAFE+12,SAFE+Math.round(24*sf));
  const midX=W/2,midY=H*0.46;
  const sc=best.score,diff=sc-best.par;
  const scCol=diff<=-2?'#a78bfa':diff===-1?'#fbbf24':diff===0?'#6ec98a':'#f5f0e8';
  const achv=diff<=-2?'EAGLE':diff===-1?'BIRDIE':diff===0?'PAR':null;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font=`500 ${Math.round(15*sf)}px Archivo,Arial`;ctx.fillText(profile.name||'',midX,midY-Math.round(72*sf));
  ctx.fillStyle='rgba(255,255,255,0.42)';ctx.font=`400 ${Math.round(15*sf)}px Archivo,Arial`;ctx.fillText(`Hole ${best.hole}  ·  Par ${best.par}`,midX,midY-Math.round(42*sf));
  ctx.fillStyle=scCol;ctx.font=`800 ${Math.round(150*sf)}px Archivo,Arial`;ctx.fillText(String(sc),midX,midY+Math.round(58*sf));
  if(achv){ctx.fillStyle='#fbbf24';ctx.font=`600 ${Math.round(28*sf)}px Archivo,Arial`;ctx.fillText(achv,midX,midY+Math.round(100*sf));}
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font=`400 ${Math.round(13*sf)}px Archivo,Arial`;ctx.fillText(`${(roundData.course||'').toUpperCase()}  ·  ${roundData.date||''}`,W/2,H-Math.round(20*sf));
  await _cardChrome(ctx,W,H,sf);return _toBlob(canvas);
}

async function doShare(template, roundData, holeNum) {
  const btn=document.getElementById('share-btn-'+roundData.id);

  try {
    let blob;
    if(template==='scorecard') blob=await buildScorecardCard(roundData);
    else if(template==='best') blob=await buildBestMomentCard(roundData);
    else if(template==='hole'){
      const h=(roundData.holeData||[]).find(x=>x.hole===holeNum);
      if(h) blob=await buildHoleCard(h,roundData);
    }
    if(!blob) return;
    const objUrl=URL.createObjectURL(blob);
    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;z-index:9800;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;';
    overlay.innerHTML=`<img src="${objUrl}" style="max-width:100%;max-height:70dvh;border-radius:10px;object-fit:contain;">
      <div style="display:flex;gap:10px;width:100%;max-width:360px;">
        <button onclick="this.closest('[style*=fixed]').remove();URL.revokeObjectURL('${objUrl}')" style="flex:1;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:14px;color:#fff;font-family:Archivo,sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;touch-action:manipulation;">Cancel</button>
        <button id="sv-share-ok" style="flex:2;background:var(--green);border:none;border-radius:12px;padding:14px;color:#e8f5ec;font-family:Archivo,sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;touch-action:manipulation;">Share →</button>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('sv-share-ok').onclick=async()=>{
      overlay.remove();
      const fname=`spinvibes-${(roundData.course||'round').replace(/\s+/g,'-').toLowerCase()}.png`;
      try{const f=new File([blob],fname,{type:'image/png'});if(navigator.canShare&&navigator.canShare({files:[f]})){await navigator.share({files:[f],title:'SpinVibes Golf'});URL.revokeObjectURL(objUrl);return;}}catch(e){}
      const a=document.createElement('a');a.href=objUrl;a.download=fname;a.click();setTimeout(()=>URL.revokeObjectURL(objUrl),5000);
    };
  } catch(e){console.warn('Share error:',e);}
  finally{if(btn){btn.disabled=false;btn.textContent='&#x1F4E4; Share';}}
}

// ── UTILS ────────────────────────────────────────────────────────
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// Lightweight markdown → HTML (headings, bold/italic, bullet + numbered lists, paragraphs)
function mdToHtml(md){
  if(!md) return '';
  const e=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inline=t=>e(t)
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/__([^_]+)__/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*(?!\s)([^*]+?)\*/g,'$1<em>$2</em>');
  const lines=String(md).replace(/\r\n/g,'\n').split('\n');
  let html='',list=null;
  const close=()=>{ if(list){ html+='</'+list+'>'; list=null; } };
  for(const raw of lines){
    const line=raw.trim();
    if(!line){ close(); continue; }
    let m;
    if((m=line.match(/^(#{1,4})\s+(.*)$/))){ close(); html+='<div class="md-h md-h'+m[1].length+'">'+inline(m[2].replace(/[#\s]+$/,''))+'</div>'; continue; }
    if((m=line.match(/^[-*•]\s+(.*)$/))){ if(list!=='ul'){close();html+='<ul class="md-ul">';list='ul';} html+='<li>'+inline(m[1])+'</li>'; continue; }
    if((m=line.match(/^\d+[.)]\s+(.*)$/))){ if(list!=='ol'){close();html+='<ol class="md-ol">';list='ol';} html+='<li>'+inline(m[1])+'</li>'; continue; }
    close(); html+='<p class="md-p">'+inline(line)+'</p>';
  }
  close();
  return html;
}
function showToast(msg,type) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.style.background=type==='error'?'rgba(192,57,43,0.9)':'var(--surf2)';
  t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2200);
}
